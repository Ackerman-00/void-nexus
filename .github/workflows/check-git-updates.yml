name: Check Git Snapshot Updates

on:
  schedule:
    - cron: '0 2 * * *'  
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-warnings'

permissions:
  contents: write
  actions: write

jobs:
  check-git-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check for Universal Git Updates
        id: check
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, hashlib, datetime

          def extract_git_info(filepath):
              try:
                  with open(filepath, 'r') as f:
                      content = f.read()
              except Exception:
                  return None
              
              if '_commit=' not in content or '_gitrepo=' not in content:
                  return None
                  
              pkg_match = re.search(r'pkgname="?([^"\n\s]+)"?', content)
              commit_match = re.search(r'_commit="?([a-fA-F0-9]+)"?', content)
              repo_match = re.search(r'_gitrepo="?([^"\n]+)"?', content)
              dist_match = re.search(r'distfiles="([^"]+)"', content)
              
              if not (pkg_match and commit_match and repo_match and dist_match):
                  return None
                  
              return {
                  'name': pkg_match.group(1),
                  'commit': commit_match.group(1),
                  'gitrepo': repo_match.group(1).strip('"'),
                  'distfiles': dist_match.group(1),
                  'file': filepath,
                  'content': content
              }

          def get_latest_commit(gitrepo):
              try:
                  out = subprocess.check_output(['git', 'ls-remote', gitrepo, 'HEAD'], timeout=15)
                  decoded_out = out.decode('utf-8').strip()
                  if not decoded_out:
                      return None, None
                  
                  # EXPLICIT STRING FIX: Grab characters up to the first space/tab
                  sha = decoded_out.split()
                  
                  date_str = datetime.datetime.now(datetime.timezone.utc).strftime('%Y%m%d')
                  return sha, date_str
              except Exception as e:
                  print(f"Git error on {gitrepo}: {e}")
              return None, None

          def update_git_template(info, new_sha, new_date):
              content = info['content']
              
              # 1. Update variables safely
              content = re.sub(r'(_commit=["\']?)[^\n\s"\']+', rf'\g<1>{new_sha}', content)
              content = re.sub(r'(version=["\']?)[^\n\s"\']+', rf'\g<1>{new_date}', content)
              content = re.sub(r'(revision=["\']?)\d+', r'\g<1>1', content)
              
              # 2. Extract pure URL using pure Regex
              distfiles_match = re.search(r'distfiles="([^"]+)"', content, re.DOTALL)
              if not distfiles_match: return False
              
              dist_content = distfiles_match.group(1)
              first_url_match = re.search(r'(https?://[^\s>]+)', dist_content)
              if not first_url_match: return False
              
              primary_url_template = first_url_match.group(1)
              
              # 3. Resolve variables for tarball download
              url = primary_url_template.replace('${_commit}', new_sha).replace('$_commit', new_sha)
              url = url.replace('${version}', new_date).replace('$version', new_date)
              url = url.replace('${_upstream_arch}', 'x86_64').replace('$_upstream_arch', 'x86_64')
              
              print(f"  --> Fetching tarball: {url}")
              
              try:
                  headers = {'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) VoidLinux-BuildBot'}
                  resp = requests.get(url, timeout=45, allow_redirects=True, headers=headers)
                  if resp.status_code == 200:
                      new_hash = hashlib.sha256(resp.content).hexdigest()
                      
                      # Update ONLY the first checksum found
                      content = re.sub(r'(checksum=["\']?)[^\s"\']+', rf'\g<1>{new_hash}', content, count=1)
                      
                      with open(info['file'], 'w') as f:
                          f.write(content)
                      return True
                  else:
                      print(f"  [!] HTTP {resp.status_code} for {url}")
                      return False
              except Exception as e:
                  print(f"  [!] Download error: {e}")
                  return False

          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
          subprocess.run(['git', 'config', 'user.email', 'github-actions[bot]@users.noreply.github.com'], check=True)

          # FLAT STRUCTURE SCANNER
          templates = []
          for d in os.listdir('.'):
              t_path = os.path.join(d, 'template')
              if os.path.isdir(d) and os.path.isfile(t_path):
                  templates.append(t_path)
          
          updates = []
          for path in templates:
              info = extract_git_info(path)
              if not info: continue
              
              print(f"Checking {info['name']}...")
              latest_sha, latest_date = get_latest_commit(info['gitrepo'])
              
              if not latest_sha: continue
              if latest_sha == info['commit']:
                  print(f"  {info['name']} is up to date.")
                  continue

              # Ensure we are printing a string, not a list
              print(f"  [!] New commit found: {latest_sha[:7]}")
              
              if update_git_template(info, latest_sha, latest_date):
                  subprocess.run(['git', 'add', info['file']], check=True)
                  subprocess.run(['git', 'commit', '-m', f"auto-update: {info['name']} to {latest_sha[:7]}"], check=True)
                  updates.append(info['name'])

          if updates:
              subprocess.run(['git', 'pull', '--rebase', 'origin', 'main'], check=True)
              subprocess.run(['git', 'push', 'origin', 'main'], check=True)

          with open('updated_git_packages.txt', 'w') as f:
              for u in updates: f.write(f"{u}\n")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"updates_found={'true' if updates else 'false'}\n")
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Build Factory
        if: steps.check.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          cat updated_git_packages.txt | while read pkg; do
            echo "Triggering build factory for $pkg..."
            gh workflow run "Build and Deploy Custom XBPS" -f package_name="$pkg"
          done
