name: RootApp Auto-Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-rootapp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2 xvfb

      - name: Check for Updates and Update Template
        id: update
        run: |
          TEMPLATE_PATH="rootapp/template"
          wget -qO Root_x64.AppImage "https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"
          wget -qO Root_arm64.AppImage "https://installer.rootapp.com/installer/Linux/Arm64/Root.AppImage"

          NEW_HASH_X64=$(sha256sum Root_x64.AppImage | awk '{print $1}')
          NEW_HASH_ARM64=$(sha256sum Root_arm64.AppImage | awk '{print $1}')

          OLD_HASH_X64=$(grep -A 5 'x86_64\*)' $TEMPLATE_PATH | grep 'checksum=' | head -1 | cut -d= -f2 | tr -d ' ')
          OLD_HASH_ARM64=$(grep -A 5 'aarch64\*)' $TEMPLATE_PATH | grep 'checksum=' | head -1 | cut -d= -f2 | tr -d ' ')
          OLD_VERSION=$(grep '^version=' $TEMPLATE_PATH | cut -d= -f2 | tr -d '"' | tr -d "'")

          FORCE_UPDATE="false"
          if [[ "$OLD_VERSION" == 202* ]]; then
              FORCE_UPDATE="true"
          fi

          if [ "$OLD_HASH_X64" != "$NEW_HASH_X64" ] || [ "$OLD_HASH_ARM64" != "$NEW_HASH_ARM64" ] || [ "$FORCE_UPDATE" == "true" ]; then
            chmod +x Root_x64.AppImage
            ./Root_x64.AppImage --appimage-extract > /dev/null

            NEW_VERSION=""
            DESKTOP_FILE=$(find squashfs-root -maxdepth 1 -name "*.desktop" | head -n 1)

            if [ -n "$DESKTOP_FILE" ]; then
                NEW_VERSION=$(grep -i "^X-AppImage-Version=" "$DESKTOP_FILE" | head -n 1 | cut -d= -f2 | xargs)
                if [ -z "$NEW_VERSION" ]; then
                    NEW_VERSION=$(grep -i "^Version=" "$DESKTOP_FILE" | head -n 1 | cut -d= -f2 | xargs)
                fi
                if [[ "$NEW_VERSION" == "1.0" || "$NEW_VERSION" == "1.0.0" ]]; then
                    NEW_VERSION=""
                fi
            fi

            if [ -z "$NEW_VERSION" ]; then
                xvfb-run -a ./squashfs-root/AppRun > startup.log 2>&1 &
                APP_PID=$!
                sleep 5
                kill $APP_PID 2>/dev/null || true
                NEW_VERSION=$(grep -ioP 'Root Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' startup.log | head -1)
            fi

            if [ -z "$NEW_VERSION" ]; then
                echo "Error: Could not find version string."
                exit 1
            fi

            sed -i "s/^version=.*/version=$NEW_VERSION/" $TEMPLATE_PATH
            sed -i "s/^revision=.*/revision=1/" $TEMPLATE_PATH
            sed -i "s/$OLD_HASH_X64/$NEW_HASH_X64/" $TEMPLATE_PATH
            sed -i "s/$OLD_HASH_ARM64/$NEW_HASH_ARM64/" $TEMPLATE_PATH

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add $TEMPLATE_PATH
            git commit -m "auto-update: rootapp to $NEW_VERSION"
            git push

            echo "updates_found=true" >> $GITHUB_OUTPUT
          else
            echo "updates_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger build asynchronously
        if: steps.update.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          set -e
          WORKFLOW_NAME="Build and Deploy Custom XBPS"          
          echo "Dispatching build for rootapp"
          gh workflow run "${WORKFLOW_NAME}" \
            --ref "${GITHUB_REF_NAME}" \
            -f package_name="rootapp"
