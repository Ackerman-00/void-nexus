name: Check All Updates

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: check-updates-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-warnings'

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests packaging

      - name: Phase 1 - Scan APIs & Update Versions
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, re, requests, subprocess, hashlib, datetime, tempfile, urllib.parse
          from packaging import version as pkg_version
          from packaging.version import InvalidVersion
          from pathlib import Path

          SITE_VARS = {
              '${GNOME_SITE}':        'https://download.gnome.org/sources',
              '$GNOME_SITE':          'https://download.gnome.org/sources',
              '${KDE_SITE}':          'https://download.kde.org/stable',
              '$KDE_SITE':            'https://download.kde.org/stable',
              '${PYPI_SITE}':         'https://files.pythonhosted.org/packages/source',
              '$PYPI_SITE':           'https://files.pythonhosted.org/packages/source',
              '${GNU_SITE}':          'https://ftp.gnu.org/gnu',
              '$GNU_SITE':            'https://ftp.gnu.org/gnu',
              '${XFCE_SITE}':         'https://archive.xfce.org/src',
              '$XFCE_SITE':           'https://archive.xfce.org/src',
              '${SOURCEFORGE_SITE}':  'https://downloads.sourceforge.net',
              '$SOURCEFORGE_SITE':    'https://downloads.sourceforge.net',
              '${MOZILLA_SITE}':      'https://releases.mozilla.org/pub',
              '$MOZILLA_SITE':        'https://releases.mozilla.org/pub',
              '${NONGNU_SITE}':       'https://download.savannah.nongnu.org/releases',
              '$NONGNU_SITE':         'https://download.savannah.nongnu.org/releases',
              '${KERNEL_SITE}':       'https://www.kernel.org/pub',
              '$KERNEL_SITE':         'https://www.kernel.org/pub',
              '${CPAN_SITE}':         'https://cpan.metacpan.org/modules/by-module',
              '$CPAN_SITE':           'https://cpan.metacpan.org/modules/by-module',
              '${FREEDESKTOP_SITE}':  'https://freedesktop.org/software',
              '$FREEDESKTOP_SITE':    'https://freedesktop.org/software',
              '${DEBIAN_SITE}':       'https://ftp.debian.org/debian/pool',
              '$DEBIAN_SITE':         'https://ftp.debian.org/debian/pool',
          }

          def resolve_site_vars(url):
              for var, repl in SITE_VARS.items():
                  url = url.replace(var, repl)
              return url

          def fetch_file(url, dest_path):
              for attempt in range(3):
                  try:
                      proc = subprocess.run(['curl', '-sSL', '-A', 'VoidNexus-BuildBot/1.0', '-o', dest_path, url], timeout=150)
                      if proc.returncode == 0:
                          return True
                  except Exception as e:
                      print(f"  ⚠ Error fetching {url} (attempt {attempt+1}): {e}")
              return False

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''): h.update(chunk)
              return h.hexdigest()

          def get_github_commit_date(owner, repo, sha, gh_headers):
              api_url = f"https://api.github.com/repos/{owner}/{repo}/commits/{sha}"
              h = gh_headers.copy() if gh_headers else {}
              h.setdefault('Accept', 'application/vnd.github.v3+json')
              try:
                  resp = requests.get(api_url, headers=h, timeout=20)
                  if resp.status_code == 200:
                      date_str = resp.json()['commit']['committer']['date']
                      dt = datetime.datetime.strptime(date_str, "%Y-%m-%dT%H:%M:%SZ")
                      return dt.strftime('%Y%m%d')
              except Exception: pass
              return None

          def get_latest_commit(repo_url, gh_headers=None):
              try:
                  out = subprocess.check_output(['git', 'ls-remote', repo_url, 'HEAD'], timeout=30, stderr=subprocess.DEVNULL).decode()
              except Exception: return None, None
              m = re.search(r'([a-f0-9]{40})', out)
              if not m: return None, None
              sha = m.group(1)
              gh_m = re.search(r'github\.com[:/]([^/]+)/([^/\.]+?)(?:\.git)?$', repo_url)
              if gh_m:
                  owner, repo = gh_m.groups()
                  date_str = get_github_commit_date(owner, repo, sha, gh_headers)
                  if date_str: return sha, date_str
              return sha, datetime.datetime.now(datetime.timezone.utc).strftime('%Y%m%d')

          def get_latest_github_release(owner, repo, gh_headers):
              try:
                  resp = requests.get(f'https://api.github.com/repos/{owner}/{repo}/releases/latest', headers=gh_headers, timeout=20).json()
                  return resp.get('tag_name', '').lstrip('v')
              except Exception: pass
              return None

          def get_latest_gitlab_tag(host, project_path):
              try:
                  encoded = urllib.parse.quote(project_path, safe='')
                  url = f"https://{host}/api/v4/projects/{encoded}/repository/tags"
                  resp = requests.get(url, timeout=20); resp.raise_for_status()
                  tags = resp.json()
                  if not isinstance(tags, list): return None
                  versions = []
                  for tag in tags:
                      if not isinstance(tag, dict): continue
                      name = tag.get('name', '')
                      m = re.search(r'(\d+\.\d+(?:\.\d+)*)', name)
                      if not m: continue
                      try: pkg_version.parse(m.group(1)); versions.append(m.group(1))
                      except InvalidVersion: continue
                  if not versions: return None
                  versions.sort(key=pkg_version.parse, reverse=True)
                  return versions[0]
              except Exception: return None

          def get_pypi_latest(pkgname):
              try:
                  cand = [pkgname]
                  if pkgname.startswith('python3-'): cand.append(pkgname[8:])
                  elif pkgname.startswith('python-'): cand.append(pkgname[7:])
                  for name in cand:
                      resp = requests.get(f'https://pypi.org/pypi/{name}/json', timeout=15)
                      if resp.status_code == 200: return resp.json()['info']['version']
              except Exception: pass
              return None

          def is_date_version(ver): return bool(re.match(r'^\d{8}$', str(ver)))
          def version_is_newer(latest, current):
              if not latest or latest == current: return False
              if is_date_version(current) and '.' in str(latest): return True
              try: return pkg_version.parse(str(latest)) > pkg_version.parse(str(current))
              except Exception: return latest != current

          def resolve_url(url_template, pkgname, ver, sha, curr_ver=None, curr_sha=None, template_vars=None):
              url = resolve_site_vars(url_template)
              url = url.replace('${pkgname}', pkgname).replace('$pkgname', pkgname)
              use_ver = ver if ver else curr_ver
              if use_ver is not None:
                  use_ver = str(use_ver)
                  url = url.replace('${version}', use_ver).replace('$version', use_ver)
                  if '.' in use_ver:
                      short_ver = '.'.join(use_ver.split('.')[:-1])
                      url = url.replace('${version%.*}', short_ver)
                  if '+' in use_ver:
                      snapshot_date = use_ver.split('+', 1)[1]
                      url = url.replace('${version#*+}', snapshot_date)
              use_sha = sha if sha else curr_sha
              if use_sha is not None:
                  use_sha = str(use_sha)
                  url = url.replace('${_commit}', use_sha).replace('$_commit', use_sha)
              for a in ['${_upstream_arch}','${_arch}','$XBPS_TARGET_MACHINE','${XBPS_TARGET_MACHINE}','${_machine}']:
                  url = url.replace(a, 'x86_64')
              url = url.replace('${_deb_arch}', 'amd64').replace('$_deb_arch', 'amd64')
              if template_vars:
                  for k, v in template_vars.items(): url = url.replace('${'+k+'}', str(v)).replace('$'+k, str(v))
              url = re.sub(r'\$\{?[A-Za-z_][A-Za-z0-9_]*\}?', '', url)
              return url

          def extract_template_vars(content):
              vars_ = {}
              for m in re.finditer(r'^_([A-Za-z0-9_]+)=["\']?([A-Za-z0-9._-]+)["\']?', content, re.MULTILINE):
                  vars_[m.group(1)] = m.group(2)
                  vars_['_'+m.group(1)] = m.group(2)
              return vars_

          def extract_shell_var(var_name, content):
              pattern = rf'^{var_name}=(?:(".*?")|(\'.*?\')|\[(.*?)\]|(\S+))'
              m = re.search(pattern, content, re.MULTILINE | re.DOTALL)
              if not m: return None
              return m.group(1) or m.group(2) or m.group(3) or m.group(4)

          def extract_distfile_urls(content):
              m = re.search(r'^distfiles\+?=(.+?)(?=\n[A-Za-z#_]|\Z)', content, re.MULTILINE | re.DOTALL)
              if not m: return []
              return re.findall(r'(https?://[^\s"\'>\\]+)', m.group(1))

          def parse_checksums(content):
              line = extract_shell_var(r'_?checksum', content)
              if not line: return []
              cleaned = line.strip().translate(str.maketrans('', '', '"\''))
              return [h for h in re.split(r'\s+', cleaned) if re.fullmatch(r'[a-f0-9]{64}', h)]

          def check_missing_quotes(content):
              m = re.search(r'^_?checksum=(.*)', content, re.MULTILINE)
              if not m: return False
              return not m.group(1).strip().startswith('"')

          # CRITICAL FIX: Bulletproof Regex replacement to prevent template destruction
          def replace_checksums(content, new_hashes):
              if not new_hashes: return content
              clean = [str(h).translate(str.maketrans('', '', '[]\'" ')).strip() for h in new_hashes]
              clean = [s for s in clean if s]
              if not clean: return content
              for s in clean:
                  if not re.fullmatch(r'[a-f0-9]{64}', s): raise ValueError(f"Bad checksum: {s!r}")
              
              if len(clean) == 1:
                  repl = f'checksum="{clean[0]}"'
              else:
                  repl = 'checksum="\n ' + '\n '.join(clean) + '"'
                  
              # Safely excise ONLY the checksum block (handles multiline quotes, arrays, and single lines)
              pattern = r'^_?checksum=(?:"[^"]*"|\'[^\']*\'|\[[^\]]*\]|[^\n]*)\n?'
              content = re.sub(pattern, '', content, flags=re.MULTILINE)
              
              # Re-insert cleanly after distfiles
              content = re.sub(r'^(distfiles\+?=.+?(?:\n[ \t]+.*)*)', r'\1\n'+repl, content, flags=re.MULTILINE)
              return content

          def extract_appimage_version(appimage_path):
              try:
                  subprocess.run(['chmod', '+x', appimage_path], check=True)
                  res = subprocess.run([appimage_path, '--appimage-version'], capture_output=True, text=True, timeout=30)
                  if res.returncode == 0 and res.stdout.strip(): return res.stdout.strip()
              except Exception: pass
              try:
                  with tempfile.TemporaryDirectory() as tmpdir:
                      subprocess.run([appimage_path, '--appimage-extract'], cwd=tmpdir, capture_output=True, timeout=120)
                      ed = Path(tmpdir)/'squashfs-root'
                      if ed.is_dir():
                          for d in ed.glob('*.desktop'):
                              c = d.read_text('utf-8', errors='ignore')
                              m = re.search(r'^X-AppImage-Version=(.+)', c, re.MULTILINE)
                              if m: return m.group(1).strip()
                              m = re.search(r'^Version=(.+)', c, re.MULTILINE)
                              if m: return m.group(1).strip()
              except Exception: pass
              return None

          def get_arch_checksum(template_content, arch):
              pat = rf'{arch}.*?\n.*?checksum=([a-f0-9]+)'
              m = re.search(pat, template_content, re.DOTALL)
              return m.group(1) if m else None

          subprocess.run(['git','config','user.name','github-actions[bot]'], check=True)
          subprocess.run(['git','config','user.email','github-actions[bot]@users.noreply.github.com'], check=True)
          branch = os.environ.get('GITHUB_REF_NAME', 'main')
          subprocess.run(['git','checkout','-B',branch], check=True)

          templates = []
          for d in os.listdir('.'):
              tp = os.path.join(d, 'template')
              if os.path.isdir(d) and os.path.isfile(tp): templates.append(Path(tp))

          changed_packages = []
          gh_token = os.environ.get('GITHUB_TOKEN')
          gh_headers = {'Accept': 'application/vnd.github.v3+json'}
          if gh_token: gh_headers['Authorization'] = f'token {gh_token}'

          for tpath in templates:
              raw = tpath.read_text(encoding='utf-8')
              pkg_m = re.search(r'^pkgname=["\']?([^"\'\s\n]+)', raw, re.MULTILINE)
              ver_m = re.search(r'^version=["\']?([^"\'\n\s]+)', raw, re.MULTILINE)
              if not pkg_m or not ver_m: continue
              pkgname, curr_ver = pkg_m.group(1), ver_m.group(1)
              commit_m = re.search(r'^_commit=["\']?([a-fA-F0-9]{7,40})', raw, re.MULTILINE)
              curr_sha = commit_m.group(1) if commit_m else None
              tmpl_vars = extract_template_vars(raw)
              print(f"Scanning {pkgname}...")
              new_ver, new_sha = None, None

              if pkgname == "rootapp":
                  print("  → Fetching rootapp AppImages...")
                  x64_url = "https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"
                  arm64_url = "https://installer.rootapp.com/installer/Linux/Arm64/Root.AppImage"
                  with tempfile.TemporaryDirectory() as tmpdir:
                      xp, ap = os.path.join(tmpdir,"Root_x64.AppImage"), os.path.join(tmpdir,"Root_arm64.AppImage")
                      if fetch_file(x64_url,xp) and fetch_file(arm64_url,ap):
                          nv = extract_appimage_version(xp)
                          if not nv: print("  → ERROR: Could not extract AppImage version"); continue
                          nx, na = sha256_file(xp), sha256_file(ap)
                          cx, ca = get_arch_checksum(raw,'x86_64'), get_arch_checksum(raw,'aarch64')
                          print(f"  → {curr_ver} → {nv}")
                          if version_is_newer(nv, curr_ver):
                              c = raw
                              c = re.sub(r'^version=.*',f'version={nv}',c,flags=re.MULTILINE)
                              c = re.sub(r'^revision=.*','revision=1',c,flags=re.MULTILINE)
                              if cx: c = c.replace(cx, nx)
                              if ca: c = c.replace(ca, na)
                              tpath.write_text(c, encoding='utf-8')
                              changed_packages.append(pkgname)
                              print(f"  → Updated {pkgname}")
                          else: print("  → No update")
                      else: print("  → ERROR: download failed")
                  continue

              checksum_changed = False
              cur_urls = extract_distfile_urls(raw)
              if cur_urls:
                  resolved_cur = []
                  for u in cur_urls:
                      r = resolve_url(u, pkgname, ver=None, sha=None, curr_ver=curr_ver, curr_sha=curr_sha, template_vars=tmpl_vars)
                      if r is None: resolved_cur = None; break
                      resolved_cur.append(r)
                  if resolved_cur:
                      cur_hashes, fetch_ok = [], True
                      for u in resolved_cur:
                          with tempfile.NamedTemporaryFile(delete=False, suffix='.dl') as tmp: tp = tmp.name
                          if fetch_file(u, tp): cur_hashes.append(sha256_file(tp)); os.unlink(tp)
                          else: fetch_ok = False; break
                      if fetch_ok:
                          expected = parse_checksums(raw)
                          checksum_changed = (cur_hashes != expected)
                          if checksum_changed: print(f"  → Checksum mismatch (silent distfile change)")
                      is_corrupted = bool(extract_shell_var(r'_?checksum', raw) and re.search(r'[\[\],]', extract_shell_var(r'_?checksum', raw)))
                      if is_corrupted: checksum_changed = True

              if curr_sha is not None:
                  repo_m = re.search(r'^_gitrepo=["\']?([^"\'\n\s]+)', raw, re.MULTILINE)
                  repo_url = repo_m.group(1) if repo_m else None
                  if not repo_url:
                      gh_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)', raw)
                      if gh_m: repo_url = f'https://github.com/{gh_m.group(1)}'
                  if repo_url:
                      found_sha, found_date = get_latest_commit(repo_url, gh_headers)
                      if found_sha and found_sha != curr_sha: new_sha, new_ver = found_sha, found_date
              else:
                  gh_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+)/([A-Za-z0-9_.-]+)', raw)
                  gl_m = re.search(r'https://(gitlab[A-Za-z0-9_.-]*\.[a-z]+)/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)', raw)
                  if gh_m:
                      owner, rpo = gh_m.group(1), gh_m.group(2)
                      latest = get_latest_github_release(owner, rpo, gh_headers)
                      if version_is_newer(latest, curr_ver): new_ver = latest
                  elif gl_m:
                      host, proj = gl_m.group(1), gl_m.group(2)
                      latest = get_latest_gitlab_tag(host, proj)
                      if version_is_newer(latest, curr_ver): new_ver = latest
                  if new_ver is None and ('PYPI_SITE' in raw or pkgname.startswith('python')):
                      pv = get_pypi_latest(pkgname)
                      if pv and version_is_newer(pv, curr_ver): new_ver = pv

              if isinstance(new_ver, list) or isinstance(new_sha, list): continue

              needs_quote_fix = check_missing_quotes(raw)
              if not new_ver and not new_sha and not checksum_changed and not needs_quote_fix: continue

              candidate = raw
              if new_sha: candidate = re.sub(r'^(_commit=["\']?)[a-fA-F0-9]+', lambda m: f"{m.group(1)}{new_sha}", candidate, flags=re.MULTILINE)
              if new_ver: candidate = re.sub(r'^(\bversion=["\']?)[^\n\s"\']+', lambda m: f"{m.group(1)}{new_ver}", candidate, flags=re.MULTILINE)

              if new_ver or new_sha:
                  urls = extract_distfile_urls(candidate)
                  if urls:
                      resolved = []
                      for u in urls:
                          r = resolve_url(u, pkgname, ver=new_ver, sha=new_sha, curr_ver=curr_ver, curr_sha=curr_sha, template_vars=tmpl_vars)
                          if r is None: resolved = None; break
                          resolved.append(r)
                      if resolved is None: continue
                      new_checksums, fetch_ok = [], True
                      for u in resolved:
                          with tempfile.NamedTemporaryFile(delete=False, suffix='.dl') as tmp: tp = tmp.name
                          if fetch_file(u, tp): new_checksums.append(sha256_file(tp)); os.unlink(tp)
                          else: fetch_ok = False; break
                      if not fetch_ok: print(f"  ⚠ Failed to fetch new distfiles for {pkgname}"); continue
                  else:
                      new_checksums = cur_hashes
              else:
                  new_checksums = cur_hashes

              expected_len = len(parse_checksums(raw))
              if len(new_checksums) > 0 and expected_len > 0 and len(new_checksums) != expected_len:
                  print(f"  ⚠ Hash count mismatch! Extracted {len(new_checksums)} distfiles but expected {expected_len}. Skipping checksum update for safety.")
                  new_checksums = parse_checksums(raw)

              final = replace_checksums(candidate, new_checksums)
              if final == raw: continue

              if new_ver and str(new_ver) != str(curr_ver):
                  final = re.sub(r'^(revision=)\d+', r'\g<1>1', final, flags=re.MULTILINE)
              elif not needs_quote_fix:
                  def bump_rev(m): return m.group(1) + str(int(m.group(2)) + 1)
                  final = re.sub(r'^(revision=)(\d+)', bump_rev, final, flags=re.MULTILINE)

              tpath.write_text(final, encoding='utf-8')
              changed_packages.append(pkgname)
              if needs_quote_fix and not new_ver and not new_sha and not checksum_changed:
                  print(f"  ✅ Formatted checksums for {pkgname}")
              else:
                  print(f"  ✅ Processed {pkgname}")

          if changed_packages:
              Path('changed_packages.txt').write_text('\n'.join(changed_packages)+'\n')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"updates_found={'true' if changed_packages else 'false'}\n")
          PYEOF

      - name: Phase 2 - Commit and Push Updates
        if: steps.scan.outputs.updates_found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          if ! git diff --cached --quiet; then
            git commit -m "auto-update: template refresh $(date -u '+%Y-%m-%d')"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes staged. Skipping commit."
          fi

      - name: Phase 3 - Trigger Relay Race
        if: steps.scan.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f changed_packages.txt ]; then
            echo "Relay race skipped: No packages changed."
            exit 0
          fi
          WORKFLOW_NAME="Build and Deploy Custom XBPS"
          ORDERED=()
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            ORDERED+=("$pkg")
          done < changed_packages.txt
          LIST="${ORDERED[*]}"
          echo "Starting relay race with: $LIST"
          gh workflow run "${WORKFLOW_NAME}" \
            --ref "${{ github.ref_name }}" \
            -f package_list="$LIST"
