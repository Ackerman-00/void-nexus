name: Check for Package Updates

on:
  schedule:
    - cron: '0 */4 * * *'  
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-warnings'

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests packaging

      - name: Check for updates and update templates
        id: check
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, hashlib, datetime
          from packaging import version

          def extract_info_from_template(filepath):
              try:
                  with open(filepath, 'r') as f:
                      content = f.read()
              except Exception:
                  return None
                  
              pkg_match = re.search(r'pkgname=["\']?([^"\n\s]+)', content)
              ver_match = re.search(r'version=["\']?([^"\n\s]+)', content)
              
              if not pkg_match or not ver_match:
                  return None
                  
              github_match = re.search(r'https://github\.com/([^/]+)/([^/\s"$}]+)', content)
              
              return {
                  'name': pkg_match.group(1),
                  'version': ver_match.group(1),
                  'github': github_match.groups() if github_match else None,
                  'file': filepath,
                  'content': content
              }

          def get_live_hash(url):
              try:
                  headers = {'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) VoidLinux-BuildBot'}
                  resp = requests.get(url, timeout=60, allow_redirects=True, headers=headers)
                  if resp.status_code == 200:
                      return hashlib.sha256(resp.content).hexdigest()
              except Exception as e:
                  print(f"  [!] Hash fetch error: {e}")
              return None

          def get_latest_version(info):
              # 1. Primary: GitHub Releases
              if info['github']:
                  owner, repo = info['github']
                  try:
                      url = f'https://api.github.com/repos/{owner}/{repo}/releases/latest'
                      headers = {'Accept': 'application/vnd.github.v3+json'}
                      token = os.environ.get('GITHUB_TOKEN')
                      if token: headers['Authorization'] = f'token {token}'
                      
                      resp = requests.get(url, headers=headers, timeout=15)
                      if resp.status_code == 200:
                          return resp.json()['tag_name'].lstrip('v')
                  except Exception as e:
                      print(f"  [!] GitHub API Error: {e}")
              
              # 2. Smart Header / Redirect Extractor (For static URLs like RootApp)
              distfiles_match = re.search(r'distfiles=["\'](.*?)["\']', info['content'], re.DOTALL)
              if not distfiles_match: distfiles_match = re.search(r'distfiles=([^\s\n]+)', info['content'])
              
              if distfiles_match:
                  try:
                      first_url = re.search(r'(https?://[^\s>]+)', distfiles_match.group(1)).group(1)
                      test_url = first_url.replace('${version}', info['version']).replace('$version', info['version'])
                      test_url = test_url.replace('${_arch_url}', 'X64').replace('${XBPS_TARGET_MACHINE}', 'x86_64')
                      
                      # Ping the server to see if it redirects to a versioned file or gives a header
                      resp = requests.head(test_url, allow_redirects=True, timeout=15)
                      
                      # Look for a version in the final URL (e.g. /downloads/1.0.0/app.AppImage)
                      v_match = re.search(r'[-_/]([0-9]+\.[0-9]+\.[0-9]+)[-_\.]', resp.url)
                      if v_match: return v_match.group(1)
                      
                      # Look for a version in the Content-Disposition (e.g. filename="Root-0.9.106.AppImage")
                      cd = resp.headers.get('Content-Disposition', '')
                      v_match = re.search(r'([0-9]+\.[0-9]+\.[0-9]+)', cd)
                      if v_match: return v_match.group(1)
                  except:
                      pass
                      
              return None

          def update_template(info, new_tag, precalculated_hash=None):
              content = info['content']
              new_version = new_tag.lstrip('v')
              
              # 1. Update Version and Reset Revision
              content = re.sub(r'(version=["\']?)[^\n\s"\']+', rf'\g<1>{new_version}', content)
              content = re.sub(r'(revision=["\']?)\d+', r'\g<1>1', content)
              
              # 2. Hash-Tracked Injection (If hash was calculated during NIX fallback mode)
              if precalculated_hash:
                  content = re.sub(r'((?:_?)checksum=["\']?)[a-fA-F0-9]{64}', rf'\g<1>{precalculated_hash}', content, count=1)
                  with open(info['file'], 'w') as f:
                      f.write(content)
                  return True
              
              # 3. Standard Download & Parse
              distfiles_match = re.search(r'distfiles=["\'](.*?)["\']', content, re.DOTALL)
              if not distfiles_match: 
                  distfiles_match = re.search(r'distfiles=([^\s\n]+)', content)
              if not distfiles_match: return False
              
              dist_content = distfiles_match.group(1)
              first_url_match = re.search(r'(https?://[^\s>]+)', dist_content)
              if not first_url_match: return False
              
              primary_url_template = first_url_match.group(1)
              
              download_url = primary_url_template.replace('${version}', new_version).replace('$version', new_version)
              download_url = download_url.replace('${_upstream_arch}', 'x86_64').replace('$_upstream_arch', 'x86_64')
              download_url = download_url.replace('${_arch_url}', 'X64').replace('$_arch_url', 'X64')
              download_url = download_url.replace('${XBPS_TARGET_MACHINE}', 'x86_64')
              
              print(f"  --> Fetching: {download_url}")
              try:
                  headers = {'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) VoidLinux-BuildBot'}
                  resp = requests.get(download_url, timeout=45, allow_redirects=True, headers=headers)
                  if resp.status_code == 200:
                      new_hash = hashlib.sha256(resp.content).hexdigest()
                      content = re.sub(r'((?:_?)checksum=["\']?)[a-fA-F0-9]{64}', rf'\g<1>{new_hash}', content, count=1)
                      
                      with open(info['file'], 'w') as f:
                          f.write(content)
                      return True
                  else:
                      print(f"  [!] HTTP {resp.status_code} - Download failed.")
                      return False
              except Exception as e:
                  print(f"  [!] Download error: {e}")
              return False

          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
          subprocess.run(['git', 'config', 'user.email', 'github-actions[bot]@users.noreply.github.com'], check=True)

          templates = []
          for d in os.listdir('.'):
              t_path = os.path.join(d, 'template')
              if os.path.isdir(d) and os.path.isfile(t_path):
                  templates.append(t_path)
          
          updates = []
          for path in templates:
              info = extract_info_from_template(path)
              if not info or '_commit=' in info['content']: continue
                  
              print(f"Checking {info['name']}...")
              latest_ver = get_latest_version(info)
              
              # THE NIX FLAKE FALLBACK: Hash Tracking Logic
              if not latest_ver:
                  print(f"  [!] No version API found. Tracking live file hash...")
                  
                  distfiles_match = re.search(r'distfiles=["\'](.*?)["\']', info['content'], re.DOTALL)
                  if not distfiles_match: distfiles_match = re.search(r'distfiles=([^\s\n]+)', info['content'])
                  
                  if distfiles_match:
                      first_url = re.search(r'(https?://[^\s>]+)', distfiles_match.group(1)).group(1)
                      current_url = first_url.replace('${version}', info['version']).replace('$version', info['version'])
                      current_url = current_url.replace('${_arch_url}', 'X64').replace('${XBPS_TARGET_MACHINE}', 'x86_64')
                      
                      live_hash = get_live_hash(current_url)
                      checksum_match = re.search(r'(?:_?)checksum=["\']?([a-fA-F0-9]{64})', info['content'])
                      
                      if live_hash and checksum_match:
                          current_hash = checksum_match.group(1)
                          if live_hash != current_hash:
                              new_pseudo_version = datetime.datetime.now(datetime.timezone.utc).strftime('%Y%m%d')
                              print(f"  [!] Hash changed! {current_hash[:8]}... -> {live_hash[:8]}...")
                              print(f"  [!] Bumping pseudo-version: {new_pseudo_version}")
                              
                              if update_template(info, new_pseudo_version, precalculated_hash=live_hash):
                                  subprocess.run(['git', 'add', info['file']], check=True)
                                  subprocess.run(['git', 'commit', '-m', f"auto-update: {info['name']} (Hash Updated)"], check=True)
                                  updates.append(info['name'])
                          else:
                              print(f"  {info['name']} is up to date (Live Hash matches).")
                  continue
              
              # Standard Semantic Version Logic
              try:
                  if version.parse(latest_ver) <= version.parse(info['version']):
                      print(f"  {info['name']} is up to date.")
                      continue
              except Exception:
                  if latest_ver == info['version']: 
                      print(f"  {info['name']} is up to date.")
                      continue

              print(f"  [!] Update Found: {info['version']} -> {latest_ver}")
              if update_template(info, latest_ver):
                  subprocess.run(['git', 'add', info['file']], check=True)
                  subprocess.run(['git', 'commit', '-m', f"auto-update: {info['name']} to {latest_ver}"], check=True)
                  updates.append(info['name'])

          if updates:
              subprocess.run(['git', 'pull', '--rebase', 'origin', 'main'], check=True)
              subprocess.run(['git', 'push', 'origin', 'main'], check=True)

          with open('updated_packages.txt', 'w') as f:
              for u in updates: f.write(f"{u}\n")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"updates_found={'true' if updates else 'false'}\n")
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Build Factory
        if: steps.check.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          cat updated_packages.txt | while read pkg; do
            echo "Triggering build factory for $pkg..."
            gh workflow run "Build and Deploy Custom XBPS" -f package_name="$pkg"
          done
