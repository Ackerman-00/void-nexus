name: Check All Updates

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: check-updates-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-warnings'

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests packaging

      - name: Phase 1 - Scan APIs & Update Versions
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, datetime
          from packaging import version as pkg_version
          from pathlib import Path

          def get_latest_commit(repo_url):
              try:
                  out = subprocess.check_output(['git', 'ls-remote', repo_url, 'HEAD'], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r'([a-f0-9]{40})', out)
                  if m: return m.group(1), datetime.datetime.now(datetime.timezone.utc).strftime('%Y%m%d')
              except Exception: pass
              return None, None

          def get_latest_github_release(owner, repo, gh_headers):
              try:
                  resp = requests.get(f'https://api.github.com/repos/{owner}/{repo}/releases/latest', headers=gh_headers, timeout=20).json()
                  return resp.get('tag_name', '').lstrip('v')
              except Exception: pass
              return None

          def get_pypi_latest(pkgname):
              try:
                  names = [pkgname, pkgname[8:] if pkgname.startswith('python3-') else pkgname, pkgname[7:] if pkgname.startswith('python-') else pkgname]
                  for name in names:
                      resp = requests.get(f'https://pypi.org/pypi/{name}/json', timeout=15)
                      if resp.status_code == 200: return resp.json()['info']['version']
              except Exception: pass
              return None

          def is_date_version(ver): return bool(re.match(r'^\d{8}$', str(ver)))
          def is_semver(ver): return '.' in str(ver)

          def version_is_newer(latest, current):
              if not latest or latest == current: return False
              if is_date_version(current) and is_semver(latest): return True
              try: return pkg_version.parse(latest) > pkg_version.parse(current)
              except Exception: return latest != current

          git_user = "github-actions[bot]"
          subprocess.run(['git', 'config', 'user.name', git_user], check=True)
          subprocess.run(['git', 'config', 'user.email', f'{git_user}@users.noreply.github.com'], check=True)

          branch = os.environ.get('GITHUB_REF_NAME', 'main')
          subprocess.run(['git', 'checkout', '-B', branch], check=True)

          templates = []
          for d in os.listdir('.'):
              if d == 'rootapp': continue
              tpath = os.path.join(d, 'template')
              if os.path.isdir(d) and os.path.isfile(tpath):
                  templates.append(Path(tpath))

          changed_packages = []
          gh_token = os.environ.get('GITHUB_TOKEN')
          gh_headers = {
              'Accept': 'application/vnd.github.v3+json',
              **(({'Authorization': f'token {gh_token}'}) if gh_token else {})
          }

          for tpath in templates:
              raw = tpath.read_text(encoding='utf-8')
              pkg_m = re.search(r'pkgname=["\']?([^"\'\s\n]+)', raw)
              ver_m = re.search(r'\bversion=["\']?([^"\'\n\s]+)', raw)
              if not pkg_m or not ver_m: continue

              pkgname, curr_ver = pkg_m.group(1), ver_m.group(1)
              commit_m = re.search(r'_commit=["\']?([a-fA-F0-9]{7,40})', raw)
              curr_sha = commit_m.group(1) if commit_m else None

              print(f"Scanning {pkgname}...")
              new_ver, new_sha = None, None

              if curr_sha is not None:
                  repo_m = re.search(r'_gitrepo=["\']?([^"\'\n\s]+)', raw)
                  repo_url = repo_m.group(1) if repo_m else None
                  if not repo_url:
                      gh_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)', raw)
                      repo_url = f'https://github.com/{gh_m.group(1)}' if gh_m else None
                  if repo_url:
                      found_sha, found_date = get_latest_commit(repo_url)
                      if found_sha and found_sha != curr_sha:
                          new_sha, new_ver = found_sha, found_date
              else:
                  gh_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+)/([A-Za-z0-9_.-]+)', raw)
                  if gh_m:
                      owner, repo = gh_m.group(1), gh_m.group(2)
                      latest = get_latest_github_release(owner, repo, gh_headers)
                      if version_is_newer(latest, curr_ver): new_ver = latest

                  if new_ver is None and ('PYPI_SITE' in raw or pkgname.startswith('python')):
                      pypi_latest = get_pypi_latest(pkgname)
                      if pypi_latest and version_is_newer(pypi_latest, curr_ver): new_ver = pypi_latest

              is_corrupted = bool(re.search(r'checksum=.*\[', raw))

              if not new_ver and not new_sha and not is_corrupted:
                  continue

              candidate = raw
              if new_sha: candidate = re.sub(r'(_commit=["\']?)[a-fA-F0-9]+', lambda m: m.group(1) + new_sha, candidate)
              if new_ver: candidate = re.sub(r'(\bversion=["\']?)[^\n\s"\']+', lambda m: m.group(1) + new_ver, candidate)
              
              if new_ver or new_sha:
                  candidate = re.sub(r'(\brevision=["\']?)\d+', r'\g<1>1', candidate)
              else:
                  def bump_rev(m): return m.group(1) + str(int(m.group(2)) + 1)
                  candidate = re.sub(r'(\brevision=["\']?)(\d+)', bump_rev, candidate)

              # Wipe the checksum line so Void's native xgensum can cleanly recreate it later
              candidate = re.sub(r'^_?checksum=.*?\n', 'checksum=\n', candidate, flags=re.MULTILINE)

              if candidate != raw:
                  tpath.write_text(candidate, encoding='utf-8')
                  changed_packages.append(pkgname)
                  print(f"Marked for manifest update: {pkgname}")

          if changed_packages:
              Path('changed_packages.txt').write_text('\n'.join(changed_packages) + '\n')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"updates_found={'true' if changed_packages else 'false'}\n")
          EOF

      - name: Phase 2 - Regenerate Checksums Natively (xgensum)
        if: steps.scan.outputs.updates_found == 'true'
        run: |
          set -e
          cat > manifest_script.sh << 'EOF'
          #!/bin/sh
          set -eu
          
          export XBPS_YES=1
          echo ">>> Installing container dependencies..."
          xbps-install -Syu || true
          xbps-install -y bash git curl tar coreutils findutils xtools
          
          echo ">>> Cloning void-packages to utilize native xgensum..."
          git clone --depth=1 https://github.com/void-linux/void-packages.git /tmp/void-packages
          
          cd /tmp/void-packages
          
          # THE FIX: Apply your exact bypass from build.yml (Zero-Bootstrap!)
          echo ">>> Injecting Nexus Masterdir Bypass..."
          ln -s / masterdir
          echo "x86_64" > /.xbps_chroot_init
          echo "XBPS_CHROOT_CMD=ethereal" >> etc/conf
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
          
          # Copy our templates over into the build chroot
          find /workspace -maxdepth 2 -name "template" | while read -r tmpl; do
            pkg_dir=$(dirname "$tmpl")
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            cp -r "$pkg_dir" srcpkgs/ 2>/dev/null || true
          done
          
          echo ">>> Executing native checksum generation..."
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            echo "Generating native hashes for $pkg..."
            xgensum -f -i "$pkg"
            
            # Copy the perfectly formatted template back to your repo
            cp srcpkgs/$pkg/template /workspace/$pkg/template
          done < /workspace/changed_packages.txt
          EOF
          chmod +x manifest_script.sh
          
          docker run --rm --privileged -v "${{ github.workspace }}:/workspace" ghcr.io/void-linux/void-glibc-full:latest sh /workspace/manifest_script.sh

      - name: Phase 3 - Commit and Push Updates
        if: steps.scan.outputs.updates_found == 'true'
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "auto-update: template refresh & native checksums $(date -u '+%Y-%m-%d')"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Phase 4 - Trigger Relay Race (Strict Sequential)
        if: steps.scan.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          set -e
          WORKFLOW_NAME="Build and Deploy Custom XBPS"

          if git diff --quiet HEAD~1 HEAD 2>/dev/null; then
            exit 0
          fi
          if [ ! -s changed_packages.txt ]; then
            exit 0
          fi

          PRIORITY_ORDER=(
            "hyprutils" "hyprlang" "hyprwayland-scanner" "hyprcursor"
            "hyprgraphics" "hyprtoolkit" "aquamarine" "hyprwire"
            "hyprland" "hyprland-protocols" "hyprland-qt-support"
            "hyprland-qtutils" "xdg-desktop-portal-hyprland"
            "hyprlock" "hypridle" "hyprsunset" "hyprpaper"
            "hyprsysteminfo" "hyprpolkitagent"
          )

          CHANGED=$(cat changed_packages.txt)
          ORDERED=()

          for pkg in "${PRIORITY_ORDER[@]}"; do
            if echo "$CHANGED" | grep -qx "$pkg"; then
              ORDERED+=("$pkg")
            fi
          done

          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            already=false
            for p in "${PRIORITY_ORDER[@]}"; do
              [ "$p" = "$pkg" ] && already=true && break
            done
            if ! $already; then
              ORDERED+=("$pkg")
            fi
          done < changed_packages.txt
          
          LIST="${ORDERED[*]}"
          echo "Starting relay race with: $LIST"
          
          gh workflow run "${WORKFLOW_NAME}" \
            --ref "${GITHUB_REF_NAME}" \
            -f package_list="$LIST"
