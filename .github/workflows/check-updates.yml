name: Check for Package Updates

on:
  schedule:
    - cron: '0 */4 * * *'  
  workflow_dispatch:

env:
  # Using only this flag to stop the Node.js warning clash
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests packaging

      - name: Check for updates and update templates
        id: check
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, hashlib
          from packaging import version

          def extract_info_from_template(filepath):
              try:
                  with open(filepath, 'r') as f:
                      content = f.read()
              except Exception:
                  return None
                  
              pkg_match = re.search(r'pkgname="?([^"\n\s]+)"?', content)
              ver_match = re.search(r'version="?([^"\n\s]+)"?', content)
              
              if not pkg_match or not ver_match:
                  return None
                  
              github_match = re.search(r'https://github\.com/([^/]+)/([^/\s"$}]+)', content)
              
              return {
                  'name': pkg_match.group(1),
                  'version': ver_match.group(1),
                  'github': github_match.groups() if github_match else None,
                  'file': filepath,
                  'content': content
              }

          def get_latest_github_release(owner, repo):
              try:
                  url = f'https://api.github.com/repos/{owner}/{repo}/releases/latest'
                  headers = {'Accept': 'application/vnd.github.v3+json'}
                  token = os.environ.get('GITHUB_TOKEN')
                  if token: headers['Authorization'] = f'token {token}'
                  
                  resp = requests.get(url, headers=headers, timeout=15)
                  if resp.status_code == 200:
                      data = resp.json()
                      # Return the tag name; update_template will handle the 'v' prefix logic
                      return data['tag_name']
              except Exception as e:
                  print(f"  [!] API Error for {owner}/{repo}: {e}")
              return None

          def update_template(info, new_tag):
              content = info['content']
              # Void version usually doesn't include the 'v' prefix
              new_version = new_tag.lstrip('v')
              
              # 1. Update Version and Reset Revision
              content = re.sub(r'version=[^\n\s]+', f'version={new_version}', content)
              content = re.sub(r'revision=\d+', 'revision=1', content)
              
              # 2. Parse distfiles safely
              distfiles_match = re.search(r'distfiles="([^"]+)"', content, re.DOTALL)
              if not distfiles_match: return False
              
              # Get only the first line/URL to calculate the primary checksum
              dist_content = distfiles_match.group(1).strip()
              primary_url_raw = dist_content.splitlines().strip()
              
              # Strip the >filename redirection if it exists
              primary_url_template = primary_url_raw.split('>').strip()
              
              # 3. Resolve variables for download
              download_url = primary_url_template.replace('${version}', new_version).replace('$version', new_version)
              # Handle both tag styles (some repos use 'v1.0', others use '1.0' in the URL)
              if '${version}' not in primary_url_template and '$version' not in primary_url_template:
                  # If the URL had the tag literally, we replace the old version with the new one
                  download_url = primary_url_template.replace(info['version'], new_version)
              
              # Handle Zen architecture variable for the checksum fetch
              download_url = download_url.replace('${_upstream_arch}', 'x86_64').replace('$_upstream_arch', 'x86_64')
              
              print(f"  --> Fetching: {download_url}")
              try:
                  headers = {'User-Agent': 'Mozilla/5.0 (X11; Linux; x86_64) VoidLinux-BuildBot'}
                  resp = requests.get(download_url, timeout=45, allow_redirects=True, headers=headers)
                  if resp.status_code == 200:
                      new_hash = hashlib.sha256(resp.content).hexdigest()
                      content = re.sub(r'checksum=[^\n\s]+', f'checksum={new_hash}', content)
                      
                      with open(info['file'], 'w') as f:
                          f.write(content)
                      return True
                  else:
                      print(f"  [!] HTTP {resp.status_code} - Download failed.")
                      return False
              except Exception as e:
                  print(f"  [!] Error: {e}")
              return False

          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
          subprocess.run(['git', 'config', 'user.email', 'github-actions[bot]@users.noreply.github.com'], check=True)

          templates = []
          for d in os.listdir('.'):
              t_path = os.path.join(d, 'template')
              if os.path.isdir(d) and os.path.isfile(t_path):
                  templates.append(t_path)
          
          updates = []
          for path in templates:
              info = extract_info_from_template(path)
              if not info or not info['github'] or '_commit=' in info['content']:
                  continue
                  
              print(f"Checking {info['name']}...")
              owner, repo = info['github']
              latest_tag = get_latest_github_release(owner, repo)
              if not latest_tag: continue
              
              latest_ver = latest_tag.lstrip('v')
              
              try:
                  if version.parse(latest_ver) <= version.parse(info['version']):
                      continue
              except Exception:
                  if latest_ver == info['version']: continue

              print(f"  [!] Update: {info['version']} -> {latest_ver}")
              
              if update_template(info, latest_tag):
                  subprocess.run(['git', 'add', info['file']], check=True)
                  subprocess.run(['git', 'commit', '-m', f"auto-update: {info['name']} to {latest_ver}"], check=True)
                  updates.append(info['name'])

          if updates:
              subprocess.run(['git', 'pull', '--rebase', 'origin', 'main'], check=True)
              subprocess.run(['git', 'push', 'origin', 'main'], check=True)

          with open('updated_packages.txt', 'w') as f:
              for u in updates: f.write(f"{u}\n")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"updates_found={'true' if updates else 'false'}\n")
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Build Factory
        if: steps.check.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          cat updated_packages.txt | while read pkg; do
            echo "Triggering build for $pkg..."
            gh workflow run "Build and Deploy Custom XBPS" -f package_name="$pkg"
          done
