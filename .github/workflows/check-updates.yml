name: Check All Updates

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: check-updates-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-warnings'

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests packaging

      - name: Scan and update templates
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, hashlib, datetime, tempfile, stat
          from packaging import version as pkg_version
          from pathlib import Path

          SITE_VARS = {
              '${GNOME_SITE}':        'https://download.gnome.org/sources',
              '$GNOME_SITE':          'https://download.gnome.org/sources',
              '${KDE_SITE}':          'https://download.kde.org/stable',
              '$KDE_SITE':            'https://download.kde.org/stable',
              '${PYPI_SITE}':         'https://files.pythonhosted.org/packages/source',
              '$PYPI_SITE':           'https://files.pythonhosted.org/packages/source',
              '${GNU_SITE}':          'https://ftp.gnu.org/gnu',
              '$GNU_SITE':            'https://ftp.gnu.org/gnu',
              '${XFCE_SITE}':         'https://archive.xfce.org/src',
              '$XFCE_SITE':           'https://archive.xfce.org/src',
              '${SOURCEFORGE_SITE}':  'https://downloads.sourceforge.net',
              '$SOURCEFORGE_SITE':    'https://downloads.sourceforge.net',
              '${MOZILLA_SITE}':      'https://releases.mozilla.org/pub',
              '$MOZILLA_SITE':        'https://releases.mozilla.org/pub',
              '${NONGNU_SITE}':       'https://download.savannah.nongnu.org/releases',
              '$NONGNU_SITE':         'https://download.savannah.nongnu.org/releases',
              '${KERNEL_SITE}':       'https://www.kernel.org/pub',
              '$KERNEL_SITE':         'https://www.kernel.org/pub',
              '${CPAN_SITE}':         'https://cpan.metacpan.org/modules/by-module',
              '$CPAN_SITE':           'https://cpan.metacpan.org/modules/by-module',
              '${FREEDESKTOP_SITE}':  'https://freedesktop.org/software',
              '$FREEDESKTOP_SITE':    'https://freedesktop.org/software',
              '${DEBIAN_SITE}':       'https://ftp.debian.org/debian/pool',
              '$DEBIAN_SITE':         'https://ftp.debian.org/debian/pool',
          }

          def resolve_site_vars(url):
              for var, repl in SITE_VARS.items(): url = url.replace(var, repl)
              return url

          def fetch_file(url, dest_path):
              headers = {'User-Agent': 'VoidLinux-BuildBot/1.0'}
              try:
                  resp = requests.get(url, headers=headers, timeout=120, allow_redirects=True, stream=True)
                  if resp.status_code == 200:
                      with open(dest_path, 'wb') as f:
                          for chunk in resp.iter_content(65536): f.write(chunk)
                      return True
              except Exception: pass
              return False

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''): h.update(chunk)
              return h.hexdigest()

          def get_appimage_version(filepath):
              try:
                  os.chmod(filepath, stat.S_IRWXU)
                  res = subprocess.run([filepath, '--appimage-version'], capture_output=True, text=True, timeout=10)
                  m = re.search(r'(\d+\.\d+[\.\d]*)', res.stdout + res.stderr)
                  if m: return m.group(1)
                  out = subprocess.run(['strings', filepath], capture_output=True, text=True, timeout=10).stdout
                  m = re.search(r'(\d+\.\d+\.\d+)', out)
                  if m: return m.group(1)
              except Exception: pass
              return None

          def get_latest_commit(repo_url):
              try:
                  out = subprocess.check_output(['git', 'ls-remote', repo_url, 'HEAD'], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r'([a-f0-9]{40})', out)
                  if m: return m.group(1), datetime.datetime.now(datetime.timezone.utc).strftime('%Y%m%d')
              except Exception: pass
              return None, None

          def get_pypi_latest(pkgname):
              try:
                  names = [pkgname]
                  if pkgname.startswith('python3-'): names.append(pkgname[8:])
                  elif pkgname.startswith('python-'): names.append(pkgname[7:])
                  for name in names:
                      resp = requests.get(f'https://pypi.org/pypi/{name}/json', timeout=15)
                      if resp.status_code == 200: return resp.json()['info']['version']
              except Exception: pass
              return None

          def is_date_version(ver): return bool(re.match(r'^\d{8}$', str(ver)))
          def is_semver(ver): return '.' in str(ver)

          def version_is_newer(latest, current):
              if not latest or latest == current: return False
              if is_date_version(current) and is_semver(latest): return True
              try: return pkg_version.parse(latest) > pkg_version.parse(current)
              except Exception: return latest != current

          def resolve_url(url_template, pkgname, ver, sha, curr_ver=None, curr_sha=None, template_vars=None):
              url = resolve_site_vars(url_template)
              url = url.replace('${pkgname}', pkgname).replace('$pkgname', pkgname)
              use_ver = ver if ver else curr_ver
              if use_ver:
                  url = url.replace('${version}', use_ver).replace('$version', use_ver)
                  short_ver = '.'.join(use_ver.split('.')[:-1]) if '.' in use_ver else use_ver
                  url = url.replace('${version%.*}', short_ver)
              use_sha = sha if sha else curr_sha
              if use_sha: url = url.replace('${_commit}', use_sha).replace('$_commit', use_sha)
              for arch_var in ['${_upstream_arch}', '${_arch}', '$XBPS_TARGET_MACHINE', '${XBPS_TARGET_MACHINE}', '${_machine}']:
                  url = url.replace(arch_var, 'x86_64')
              url = url.replace('${_deb_arch}', 'amd64').replace('$_deb_arch', 'amd64')
              if template_vars:
                  for var, val in template_vars.items(): url = url.replace('${' + var + '}', val).replace('$' + var, val)
              if re.search(r'\$\{?[A-Za-z_][A-Za-z0-9_]*\}?', url): return None
              return url

          def extract_template_vars(content):
              vars_ = {}
              for m in re.finditer(r'^_([A-Za-z0-9_]+)=["\']?([A-Za-z0-9._-]+)["\']?', content, re.MULTILINE):
                  vars_[m.group(1)] = m.group(2)
                  vars_['_' + m.group(1)] = m.group(2)
              return vars_

          def extract_distfile_urls(content):
              m = re.search(r'^distfiles=(.+?)(?=\n[A-Za-z#]|\Z)', content, re.MULTILINE | re.DOTALL)
              if not m: return []
              return re.findall(r'(https?://[^\s"\'>\\]+)', m.group(1))

          def replace_checksums(content, new_hashes):
              counter = 0
              def replacer(m):
                  nonlocal counter
                  idx = counter
                  counter += 1
                  prefix = '@' if m.group(2).startswith('@') else ''
                  if idx < len(new_hashes): return f'{m.group(1)}={prefix}{new_hashes[idx]}'
                  return m.group(0)
              return re.sub(r'^(_?checksum)=["\']?([a-fA-F0-9@]+)["\']?', replacer, content, flags=re.MULTILINE)

          git_user = "github-actions[bot]"
          subprocess.run(['git', 'config', 'user.name', git_user], check=True)
          subprocess.run(['git', 'config', 'user.email', f'{git_user}@users.noreply.github.com'], check=True)

          branch = os.environ.get('GITHUB_REF_NAME', 'main')
          subprocess.run(['git', 'checkout', '-B', branch], check=True)

          templates = []
          for d in os.listdir('.'):
              tpath = os.path.join(d, 'template')
              if os.path.isdir(d) and os.path.isfile(tpath):
                  templates.append(Path(tpath))

          changed_packages = []
          changed_files = []
          gh_token = os.environ.get('GITHUB_TOKEN')
          gh_headers = {
              'Accept': 'application/vnd.github.v3+json',
              **(({'Authorization': f'token {gh_token}'}) if gh_token else {})
          }

          for tpath in templates:
              raw = tpath.read_text(encoding='utf-8')
              pkg_m = re.search(r'pkgname=["\']?([^"\'\s\n]+)', raw)
              ver_m = re.search(r'\bversion=["\']?([^"\'\n\s]+)', raw)
              if not pkg_m or not ver_m: continue

              pkgname, curr_ver = pkg_m.group(1), ver_m.group(1)
              commit_m = re.search(r'_commit=["\']?([a-fA-F0-9]{7,40})', raw)
              curr_sha = commit_m.group(1) if commit_m else None
              tmpl_vars = extract_template_vars(raw)

              print(f"🔍 {pkgname} (current: {curr_ver})")
              new_ver, new_sha = None, None

              if curr_sha is not None:
                  repo_m = re.search(r'_gitrepo=["\']?([^"\'\n\s]+)', raw)
                  repo_url = repo_m.group(1) if repo_m else None
                  if not repo_url:
                      gh_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)', raw)
                      repo_url = f'https://github.com/{gh_m.group(1)}' if gh_m else None
                  if repo_url:
                      found_sha, found_date = get_latest_commit(repo_url)
                      if found_sha and found_sha != curr_sha:
                          new_sha, new_ver = found_sha, found_date
              else:
                  gh_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+)/([A-Za-z0-9_.-]+)', raw)
                  if gh_m:
                      owner, repo = gh_m.group(1), gh_m.group(2)
                      try:
                          resp = requests.get(f'https://api.github.com/repos/{owner}/{repo}/releases/latest', headers=gh_headers, timeout=20).json()
                          latest = resp.get('tag_name', '').lstrip('v')
                          if version_is_newer(latest, curr_ver): new_ver = latest
                      except Exception: pass

                  if new_ver is None and ('PYPI_SITE' in raw or pkgname.startswith('python')):
                      pypi_latest = get_pypi_latest(pkgname)
                      if pypi_latest and version_is_newer(pypi_latest, curr_ver): new_ver = pypi_latest

              candidate = raw
              if new_sha: candidate = re.sub(r'(_commit=["\']?)[a-fA-F0-9]+', lambda m: m.group(1) + new_sha, candidate)
              if new_ver: candidate = re.sub(r'(\bversion=["\']?)[^\n\s"\']+', lambda m: m.group(1) + new_ver, candidate)

              urls = extract_distfile_urls(candidate)
              if not urls: continue

              resolved_urls = []
              for url in urls:
                  r = resolve_url(url, pkgname, ver=new_ver, sha=new_sha, curr_ver=curr_ver, curr_sha=curr_sha, template_vars=tmpl_vars)
                  if r is None:
                      resolved_urls = None
                      break
                  resolved_urls.append(r)

              if resolved_urls is None: continue

              new_checksums = []
              fetch_ok = True
              for url in resolved_urls:
                  with tempfile.NamedTemporaryFile(delete=False, suffix='.dl') as tmp: tmp_path = tmp.name
                  if fetch_file(url, tmp_path):
                      new_checksums.append(sha256_file(tmp_path))
                      os.unlink(tmp_path)
                  else:
                      try: os.unlink(tmp_path)
                      except OSError: pass
                      fetch_ok = False
                      break

              if not fetch_ok: continue

              curr_hashes_plain = [c.lstrip('@') for c in re.findall(r'^_?checksum=["\']?([a-fA-F0-9@]+)["\']?', raw, re.MULTILINE)]
              checksum_changed = (new_checksums != curr_hashes_plain)

              if not new_ver and not new_sha and not checksum_changed:
                  print(f"  ✓ Up to date")
                  continue

              if checksum_changed and not new_ver and not new_sha:
                  sniffed_ver = None
                  with tempfile.NamedTemporaryFile(delete=False, suffix='.dl') as tmp: tmp_path = tmp.name
                  if fetch_file(resolved_urls[0], tmp_path): sniffed_ver = get_appimage_version(tmp_path)
                  try: os.unlink(tmp_path)
                  except OSError: pass
                  if sniffed_ver:
                      new_ver = sniffed_ver
                      candidate = re.sub(r'(\bversion=["\']?)[^\n\s"\']+', lambda m: m.group(1) + new_ver, candidate)

              candidate = re.sub(r'(\brevision=["\']?)\d+', r'\g<1>1', candidate)
              candidate = replace_checksums(candidate, new_checksums)

              if candidate != raw:
                  tpath.write_text(candidate, encoding='utf-8')
                  changed_packages.append(pkgname)
                  changed_files.append(str(tpath))

                  ver_display = new_ver if new_ver else curr_ver
                  sha_suffix = f' ({new_sha[:8]})' if new_sha else ''
                  ck_suffix = ' (checksum refresh)' if checksum_changed and not new_ver and not new_sha else ''
                  print(f"  ✨ {pkgname}: {curr_ver} → {ver_display}{sha_suffix}{ck_suffix}")
              else:
                  print(f"  ✓ Up to date (content identical)")

          if changed_packages:
              Path('changed_packages.txt').write_text('\n'.join(changed_packages) + '\n')
              Path('changed_files.txt').write_text('\n'.join(changed_files) + '\n')
          else:
              for f in ['changed_packages.txt', 'changed_files.txt']:
                  if Path(f).exists(): Path(f).unlink()

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"updates_found={'true' if changed_packages else 'false'}\n")
          EOF

      - name: Commit and push template updates
        if: steps.scan.outputs.updates_found == 'true'
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -s changed_files.txt ]; then
            echo "No changed files list found."
            exit 0
          fi

          while IFS= read -r file; do
            [ -n "$file" ] && git add "$file"
          done < changed_files.txt

          if git diff --cached --quiet; then
            echo "No actual changes to commit. Exiting cleanly."
            exit 0
          fi

          git commit -m "auto-update: template refresh $(date -u '+%Y-%m-%d')"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Trigger builds sequentially
        if: steps.scan.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          set -e
          WORKFLOW_NAME="Build and Deploy Custom XBPS"

          if git diff --quiet HEAD~1 HEAD 2>/dev/null; then
            echo "No new commit was made. Skipping builds."
            exit 0
          fi

          if [ ! -s changed_packages.txt ]; then
            echo "No packages to build"
            exit 0
          fi

          # Hyprland dependency chain — must build in this exact order
          PRIORITY_ORDER=(
            "hyprutils"
            "hyprlang"
            "hyprwayland-scanner"
            "hyprcursor"
            "hyprgraphics"
            "aquamarine"
            "hyprwire"
            "hyprland"
            "hyprland-protocols"
            "hyprland-qt-support"
            "hyprland-qtutils"
            "xdg-desktop-portal-hyprland"
            "hyprlock"
            "hypridle"
            "hyprsunset"
            "hyprpaper"
            "hyprsysteminfo"
            "hyprpolkitagent"
          )

          CHANGED=$(cat changed_packages.txt)
          ORDERED=()

          # Add priority packages first, in order, only if they changed
          for pkg in "${PRIORITY_ORDER[@]}"; do
            if echo "$CHANGED" | grep -qx "$pkg"; then
              ORDERED+=("$pkg")
            fi
          done

          # Then add everything else that isn't in the priority list
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            already=false
            for p in "${PRIORITY_ORDER[@]}"; do
              [ "$p" = "$pkg" ] && already=true && break
            done
            if ! $already; then
              ORDERED+=("$pkg")
            fi
          done < changed_packages.txt

          # Build in correct order — exit-status halts chain if a dependency fails
          for pkg in "${ORDERED[@]}"; do
            echo "🚀 Dispatching build for $pkg"
            before_ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            gh workflow run "${WORKFLOW_NAME}" \
              --ref "${GITHUB_REF_NAME}" \
              -f package_name="${pkg}"

            sleep 8

            run_id=$(gh run list \
              --workflow="${WORKFLOW_NAME}" \
              --json databaseId,createdAt \
              --jq "[.[] | select(.createdAt >= \"${before_ts}\")] | .[0].databaseId // empty")

            if [ -n "${run_id}" ] && [ "${run_id}" != "null" ]; then
              echo "  Watching run ${run_id}"
              gh run watch "${run_id}" --exit-status
            else
              echo "  ⚠️ Could not get run ID — waiting 90s"
              sleep 90
            fi
          done
