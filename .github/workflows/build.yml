name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package to build (e.g., niri-git)'
        required: true

concurrency:
  group: build-repo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    defaults:
      run:
        shell: bash
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '0'
    steps:
      - name: Prepare container
        run: |
          set -euo pipefail
          REPO="https://repo-fastly.voidlinux.org/current"
          xbps_install() { xbps-install "$@"; local rc=$?; [ $rc -eq 0 ] || [ $rc -eq 2 ] || return $rc; }
          xbps_install -S -R "$REPO" -yu xbps
          xbps_install -S -R "$REPO" -yu
          xbps_install -S -R "$REPO" -y sudo bash curl git grep openssl tar xz shadow
          useradd -G xbuilder -M builder

      - name: Clone void-packages
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          echo "XBPS_ALLOW_CHROOT_BREAKROOT=yes" >> etc/conf
          echo "XBPS_MAKEJOBS=$(nproc)" >> etc/conf
          chown -R builder:builder .

      - name: Checkout custom templates
        uses: actions/checkout@v5
        with:
          path: custom-templates-temp

      - name: Inject custom templates
        run: |
          set -euo pipefail
          for dir in custom-templates-temp/*/; do
            [ -f "${dir}template" ] && cp -r "$dir" srcpkgs/
          done
          chown -R builder:builder srcpkgs/

      - name: Restore existing repository
        run: |
          set -euo pipefail
          PAGES_URL="https://ackerman-00.github.io/void-template"
          mkdir -p public/x86_64

          if curl -sf "${PAGES_URL}/x86_64/x86_64-repodata" \
               -o public/x86_64/x86_64-repodata 2>/dev/null; then
            xbps-query --repository=./public/x86_64 -s '' 2>/dev/null \
              | awk '{print $2}' \
              | while IFS= read -r pkgver; do
                  fname=$(xbps-query --repository=./public/x86_64 \
                            -p filename "$pkgver" 2>/dev/null) || continue
                  [ -z "$fname" ] && continue
                  curl -sf "${PAGES_URL}/x86_64/${fname}" \
                    -o "public/x86_64/${fname}" || true
                  curl -sf "${PAGES_URL}/x86_64/${fname}.sig2" \
                    -o "public/x86_64/${fname}.sig2" || true
                done
          fi

      - name: Bootstrap masterdir
        run: |
          set -euo pipefail
          sudo -Eu builder ./xbps-src binary-bootstrap

      - name: Build package
        run: |
          set -euo pipefail
          sudo -Eu builder ./xbps-src pkg "${{ github.event.inputs.package_name }}"

      - name: Sign and index repository
        run: |
          set -euo pipefail
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem

          find hostdir/binpkgs -name "*.xbps" -exec cp {} public/x86_64/ \;

          cd public/x86_64
          if ls *.xbps 1>/dev/null 2>&1; then
            xbps-rindex --privkey /tmp/private.pem --sign-pkg *.xbps
            xbps-rindex -a *.xbps
            xbps-rindex --privkey /tmp/private.pem \
              --signedby "Void Template Build Bot <actions@github.com>" --sign .
          fi

          rm -f /tmp/private.pem

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
