name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package to build (e.g., niri-git)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: build-${{ github.event.inputs.package_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '1'
    steps:
      - name: Prepare container
        run: |
          REPO="https://repo-fastly.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || xbps-install -S -R "$REPO" -yu xbps
          xbps-install -S -R "$REPO" -yu
          xbps-install -S -R "$REPO" -y sudo bash curl git grep openssl tar xz
          useradd -G xbuilder -M builder

      - name: Clone Official Void-Packages
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          chown -R builder:builder .

      - name: Checkout Your Custom Templates
        uses: actions/checkout@v5
        with:
          path: custom-templates-temp

      - name: Inject Template & Pre-fetch
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          
          # 1. Inject the template
          cp -r custom-templates-temp/$PKG srcpkgs/
          
          # 2. Extract info for pre-fetching
          # This helps bypass 400 Bad Request errors on stubborn servers
          VERSION=$(grep '^version=' srcpkgs/$PKG/template | cut -d= -f2)
          COMMIT=$(grep '^_commit=' srcpkgs/$PKG/template | cut -d= -f2)
          DISTURL=$(grep '^distfiles=' srcpkgs/$PKG/template | cut -d'"' -f2 | head -n1)
          
          # Resolve variables in URL
          FETCH_URL=$(echo $DISTURL | sed "s/\${version}/$VERSION/g" | sed "s/\${_commit}/$COMMIT/g")
          FILENAME=$(basename $FETCH_URL)
          
          # 3. Create the source directory and fetch manually with a proper User-Agent
          mkdir -p hostdir/sources/$PKG-$VERSION
          echo "Pre-fetching $FETCH_URL..."
          curl -L -A "Mozilla/5.0 (X11; Linux x86_64) VoidLinux-BuildBot" "$FETCH_URL" -o "hostdir/sources/$PKG-$VERSION/$FILENAME"
          
          # 4. Setup Build Environment
          mkdir -p etc
          echo "XBPS_ALLOW_CHROOT_BREAKROOT=yes" >> etc/conf
          
          # 5. REPO PERSISTENCE
          mkdir -p public/x86_64
          curl -L https://ackerman-00.github.io/void-template/x86_64/x86_64-repodata -o public/x86_64/x86_64-repodata || true
          
          if [ -f public/x86_64/x86_64-repodata ]; then
              xbps-query -R https://ackerman-00.github.io/void-template -m | while read p; do
                  pkg_file=$(xbps-query -R https://ackerman-00.github.io/void-template -p filename "$p")
                  curl -L "https://ackerman-00.github.io/void-template/x86_64/$pkg_file" -o "public/x86_64/$pkg_file" || true
              done
          fi
          
          chown -R builder:builder .

      - name: Prepare Masterdir
        run: |
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Build Package
        run: |
          echo "${{ github.event.inputs.package_name }}" > /tmp/templates
          sudo -Eu builder common/travis/build.sh "$BOOTSTRAP" "$ARCH" "$TEST"

      - name: Sign & Index Repository
        run: |
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem
          find hostdir/binpkgs -name "*.xbps" -exec cp {} public/x86_64/ \;
          cd public/x86_64
          if ls *.xbps 1> /dev/null 2>&1; then
            xbps-rindex --privkey /tmp/private.pem --sign-pkg *.xbps
            xbps-rindex -a *.xbps
            xbps-rindex --privkey /tmp/private.pem --signedby "Apex Linux Build Bot <actions@github.com>" --sign .
          fi
          rm /tmp/private.pem

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: "pages-deploy"
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
