name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package to build'
        required: true

concurrency:
  group: build-repo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    defaults:
      run:
        shell: bash          # Force bash for all steps
    steps:
      - name: Prepare container
        run: |
          set -e
          # Update xbps and install required tools
          xbps-install -S -y xbps
          xbps-install -S -yu
          xbps-install -S -y bash curl git grep openssl tar xz shadow
          # Create builder user if it doesn't exist
          id -u builder >/dev/null 2>&1 || useradd -m builder
          chown -R builder:builder .

      - name: Clone void-packages
        run: |
          set -e
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          echo "XBPS_ALLOW_CHROOT_BREAKROOT=yes" >> etc/conf
          echo "XBPS_MAKEJOBS=$(nproc)" >> etc/conf
          chown -R builder:builder .

      - name: Checkout custom templates
        uses: actions/checkout@v5
        with:
          path: custom-templates-temp

      - name: Inject custom templates
        run: |
          set -e
          # Copy only folders that contain a template file, skip hidden directories
          find custom-templates-temp -maxdepth 2 -name "template" | while read -r tmpl; do
            pkg_dir=$(dirname "$tmpl")
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            cp -r "$pkg_dir" srcpkgs/
          done
          chown -R builder:builder srcpkgs/

      - name: Restore existing repository
        run: |
          set -e
          PAGES_URL="https://ackerman-00.github.io/void-template"
          mkdir -p public/x86_64
          if curl -sfL "${PAGES_URL}/x86_64/x86_64-repodata" -o public/x86_64/x86_64-repodata; then
            echo "Repository index found. Syncing existing binaries..."
            xbps-query --repository=./public/x86_64 -s '' | awk '{print $2}' | while read -r pkgver; do
              fname=$(xbps-query --repository=./public/x86_64 -p filename "$pkgver" 2>/dev/null) || continue
              curl -sfL "${PAGES_URL}/x86_64/${fname}" -o "public/x86_64/${fname}" || true
              curl -sfL "${PAGES_URL}/x86_64/${fname}.sig2" -o "public/x86_64/${fname}.sig2" || true
            done
          fi

      - name: Bootstrap masterdir
        run: sudo -u builder ./xbps-src binary-bootstrap

      - name: Build package
        run: sudo -u builder ./xbps-src pkg "${{ github.event.inputs.package_name }}"

      - name: Sign and index repository
        run: |
          set -e
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem

          find hostdir/binpkgs -name "*.xbps" -exec cp -v {} public/x86_64/ \;

          cd public/x86_64
          if ls *.xbps 1>/dev/null 2>&1; then
            xbps-rindex --privkey /tmp/private.pem --sign-pkg *.xbps
            xbps-rindex -a *.xbps
            xbps-rindex --privkey /tmp/private.pem --signedby "Void Template Build Bot <actions@github.com>" --sign .
          fi
          rm -f /tmp/private.pem

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
