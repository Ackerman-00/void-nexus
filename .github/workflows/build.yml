name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package to build (e.g., niri-git)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Build Concurrency: Allows parallel builds for DIFFERENT packages.
concurrency:
  group: build-${{ github.event.inputs.package_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '1'
    steps:
      - name: Prepare container
        run: |
          REPO="https://repo-fastly.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || xbps-install -S -R "$REPO" -yu xbps
          xbps-install -S -R "$REPO" -yu
          xbps-install -S -R "$REPO" -y sudo bash curl git grep openssl tar xz
          useradd -G xbuilder -M builder

      - name: Clone Official Void-Packages
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          chown -R builder:builder .

      - name: Checkout Your Custom Templates
        uses: actions/checkout@v5
        with:
          path: custom-templates-temp

      - name: Inject Template & Persistence
        run: |
          # 1. Inject the specific package (Flat structure fix: directly from root)
          cp -r custom-templates-temp/${{ github.event.inputs.package_name }} srcpkgs/
          
          # 2. Setup Build Environment
          mkdir -p etc
          echo "XBPS_ALLOW_CHROOT_BREAKROOT=yes" >> etc/conf
          
          # 3. REPO PERSISTENCE: Sync existing binaries from GitHub Pages
          mkdir -p public/x86_64
          echo "Fetching existing repository index..."
          curl -L https://ackerman-00.github.io/void-template/x86_64/x86_64-repodata -o public/x86_64/x86_64-repodata || true
          
          if [ -f public/x86_64/x86_64-repodata ]; then
             echo "Syncing existing binaries to prevent repo wipe..."
             # Extract current package list and download existing .xbps files
             xbps-query -R https://ackerman-00.github.io/void-template -m | while read pkg; do
                pkg_file=$(xbps-query -R https://ackerman-00.github.io/void-template -p filename "$pkg")
                curl -L "https://ackerman-00.github.io/void-template/x86_64/$pkg_file" -o "public/x86_64/$pkg_file" || true
             done
          fi
          
          chown -R builder:builder .

      - name: Prepare Masterdir
        run: |
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Build Package
        run: |
          echo "${{ github.event.inputs.package_name }}" > /tmp/templates
          sudo -Eu builder common/travis/build.sh "$BOOTSTRAP" "$ARCH" "$TEST"

      - name: Setup Private Key for Signing
        run: |
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem

      - name: Sign & Index Repository
        run: |
          # Copy newly built packages to public folder
          find hostdir/binpkgs -name "*.xbps" -exec cp {} public/x86_64/ \;
          cd public/x86_64
          
          if ls *.xbps 1> /dev/null 2>&1; then
            # Sign the individual packages
            xbps-rindex --privkey /tmp/private.pem --sign-pkg *.xbps
            
            # Index the entire folder (Old + New)
            xbps-rindex -a *.xbps
            
            # Sign the repository metadata
            xbps-rindex --privkey /tmp/private.pem --signedby "Apex Linux Build Bot <actions@github.com>" --sign .
          fi
          
          rm /tmp/private.pem

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Prevents deployment race conditions
    concurrency:
      group: "pages-deploy"
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
