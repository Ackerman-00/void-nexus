name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package to build'
        required: true

concurrency:
  group: void-nexus-build-queue
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-warnings'

jobs:
  build:
    name: Build and Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    defaults:
      run:
        shell: bash
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '0'
    steps:
      - name: Prepare container
        shell: sh
        run: |
          set -e
          REPO="https://repo-default.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || true
          xbps-install -S -R "$REPO" -yu || true
          xbps-install -S -R "$REPO" -y bash curl git grep openssl tar xz shadow sudo base-devel file
          git config --global --add safe.directory '*'

      - name: Clone void-packages
        run: |
          set -e
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          ln -s / masterdir
          echo "x86_64" > /.xbps_chroot_init
          echo "XBPS_CHROOT_CMD=ethereal" >> etc/conf
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
          echo "XBPS_MAKEJOBS=$(nproc)" >> etc/conf
          rm -f common/hooks/pre-pkg/99-pkglint.sh

      - name: Checkout custom templates
        uses: actions/checkout@v4
        with:
          path: custom-templates-temp

      - name: Inject custom templates
        run: |
          set -e
          find custom-templates-temp -maxdepth 2 -name "template" | while read -r tmpl; do
            pkg_dir=$(dirname "$tmpl")
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            cp -r "$pkg_dir" srcpkgs/
          done

      - name: Restore existing repository
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/rolling"
          mkdir -p public/x86_64
          if curl -sfL "${RELEASE_URL}/x86_64-repodata" -o public/x86_64/x86_64-repodata; then
            REPO_DIR="$PWD/public/x86_64"
            set +o pipefail || true
            xbps-query --repository="$REPO_DIR" -l 2>/dev/null | awk '{print $2}' > /tmp/pkgs.txt || true
            while IFS= read -r pkg; do
              [ -z "$pkg" ] && continue
              fname=$(xbps-query --repository="$REPO_DIR" -p filename "$pkg" 2>/dev/null) || continue
              [ -z "$fname" ] && continue
              curl -sfL "${RELEASE_URL}/${fname}" -o "public/x86_64/${fname}" || true
              curl -sfL "${RELEASE_URL}/${fname}.sig2" -o "public/x86_64/${fname}.sig2" || true
            done < /tmp/pkgs.txt
            set -o pipefail || true
          fi

      - name: Build self-healing shlibs map
        run: |
          if ! ls public/x86_64/*.xbps 1>/dev/null 2>&1; then
            exit 0
          fi          
          TMP_SHLIBS=$(mktemp)
          for file in public/x86_64/*.xbps; do
            fname=$(basename "$file")
            pkg_full=$(echo "$fname" | sed -E 's/\.[^.]+\.xbps$//')
            REPO_DIR="$PWD/public/x86_64"
            
            PKGVER=$(xbps-query --repository="$REPO_DIR" -p pkgver "$pkg_full" 2>/dev/null || echo "")
            [ -z "$PKGVER" ] && continue
            
            SHLIBS=$(xbps-query --repository="$REPO_DIR" -p shlib-provides "$pkg_full" 2>/dev/null || echo "")
            for so in $SHLIBS; do
              echo "$so $PKGVER" >> "$TMP_SHLIBS"
            done
          done
          
          if [ -f common/shlibs ]; then
            cat common/shlibs "$TMP_SHLIBS" | sort -u > /tmp/merged_shlibs
          else
            sort -u "$TMP_SHLIBS" > /tmp/merged_shlibs
          fi
          
          mv /tmp/merged_shlibs common/shlibs
          rm -f "$TMP_SHLIBS"

      - name: Build package
        run: ./xbps-src pkg "${{ github.event.inputs.package_name }}"

      - name: Sign and index repository
        run: |
          set -e
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem
          mkdir -p public/clean_x86_64
          
          ls -1 custom-templates-temp/ | while read -r pkg_name; do
            [ ! -d "custom-templates-temp/$pkg_name" ] && continue
            
            tmpl="custom-templates-temp/$pkg_name/template"
            if [ -f "$tmpl" ]; then
              ver=$(grep '^version=' "$tmpl" 2>/dev/null | head -1 | cut -d= -f2 | tr -d '"'"'" || true)
              rev=$(grep '^revision=' "$tmpl" 2>/dev/null | head -1 | cut -d= -f2 | tr -d '"'"'" || true)
              
              find hostdir/binpkgs public/x86_64 -type f -name "${pkg_name}*-${ver}_${rev}.x86_64.xbps" -exec cp {} public/clean_x86_64/ \; 2>/dev/null || true
            fi
          done

          rm -rf public/x86_64
          mv public/clean_x86_64 public/x86_64

          cd public/x86_64
          
          if ls *.xbps 1>/dev/null 2>&1; then
            xbps-rindex --privkey /tmp/private.pem --sign-pkg *.xbps || true
            xbps-rindex -f -a *.xbps || true
            xbps-rindex --privkey /tmp/private.pem --signedby "Void Nexus Build Bot <actions@github.com>" --sign . || true
          fi
          rm -f /tmp/private.pem

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: void-repo
          path: public/x86_64/

  deploy:
    name: Deploy to GitHub Releases
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: void-repo
          path: repo/
      - name: Deploy to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view rolling || gh release create rolling --title "Void Nexus Rolling" --notes "Automated XBPS Binaries"
          cd repo
          find . -type f -exec gh release upload rolling {} --clobber \;
