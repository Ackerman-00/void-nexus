name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of packages to build'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-warnings'

jobs:
  build:
    name: Build and Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    defaults:
      run:
        shell: bash
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '0'
    steps:
      - name: Prepare container
        shell: sh
        run: |
          set -e
          REPO="https://repo-default.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || true
          xbps-install -S -R "$REPO" -yu || true
          xbps-install -S -R "$REPO" -y bash curl git grep openssl tar xz shadow sudo base-devel file github-cli zstd
          git config --global --add safe.directory '*'

      - name: Clone void-packages
        run: |
          set -e
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          ln -s / masterdir
          echo "x86_64" > /.xbps_chroot_init
          echo "XBPS_CHROOT_CMD=ethereal" >> etc/conf
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
          echo "XBPS_MAKEJOBS=$(nproc)" >> etc/conf
          rm -f common/hooks/pre-pkg/99-pkglint.sh

      - name: Inject Real-Time Shlibs Hook
        run: |
          # This runs AFTER a dependency (like aquamarine) builds but BEFORE the main package (hyprtoolkit).
          # It guarantees brand-new shlibs are instantly available to the build environment.
          mkdir -p common/hooks/post-pkg
          cat << 'EOF' > common/hooks/post-pkg/99-shlibs-inject.sh
          hook() {
            # FIXED: Pointing strictly to the repository folder where xbps-src drops new binaries
            local pkg_file="$XBPS_REPOSITORY/${pkgname}-${version}_${revision}.${XBPS_TARGET_MACHINE}.xbps"
            
            if [ -f "$pkg_file" ]; then
               echo "=> ${pkgname}: Dynamically injecting shlibs from ${pkg_file}..."
               # Safely parse the XML from the archive to extract shared libraries
               local new_shlibs=$( (tar xOf "$pkg_file" ./props.plist 2>/dev/null || tar xOf "$pkg_file" props.plist 2>/dev/null || zstdcat "$pkg_file" | tar xOf - ./props.plist 2>/dev/null || zstdcat "$pkg_file" | tar xOf - props.plist 2>/dev/null) | awk '/<key>shlib-provides<\/key>/{flag=1; next} /<\/array>/{flag=0} flag && /<string>/{gsub(/.*<string>|<\/string>.*/, ""); print}' || true )
               
               for so in $new_shlibs; do
                 echo "$so ${pkgname}-${version}_${revision}" >> $XBPS_DISTDIR/common/shlibs
                 echo "   -> Successfully Injected: $so"
               done
            else
               echo "=> ${pkgname}: WARNING: Could not find ${pkg_file} to inject shlibs!"
            fi
          }
          EOF
          chmod +x common/hooks/post-pkg/99-shlibs-inject.sh

      - name: Checkout custom templates
        uses: actions/checkout@v4
        with:
          path: custom-templates-temp

      - name: Parse Package List
        run: |
          LIST="${{ github.event.inputs.package_list }}"
          read -r -a PKGS <<< "$LIST"
          echo "TARGET_PKG=${PKGS}" >> $GITHUB_ENV

      - name: Inject custom templates
        run: |
          set -e
          find custom-templates-temp -maxdepth 2 -name "template" | while read -r tmpl; do
            pkg_dir=$(dirname "$tmpl")
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            cp -r "$pkg_dir" srcpkgs/
          done

      - name: Restore Repository & Setup Dependency Cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p hostdir/binpkgs
          
          echo "Downloading existing packages from rolling release..."
          gh release download rolling -p "*.xbps" -p "*.sig2" -p "*-repodata" --repo ${{ github.repository }} --dir hostdir/binpkgs || echo "First run or no packages found."
          
          if ls hostdir/binpkgs/*.xbps 1>/dev/null 2>&1; then
            cd hostdir/binpkgs
            xbps-rindex -a *.xbps || true
            cd ../..
          fi
          
          echo "repository=/__w/void-nexus/void-nexus/hostdir/binpkgs" >> etc/conf

      - name: Build self-healing shlibs map
        run: |
          echo "Generating shlibs map by directly extracting props.plist from binaries..."
          touch common/shlibs
          TMP_SHLIBS=$(mktemp)
          
          if ls hostdir/binpkgs/*.xbps 1>/dev/null 2>&1; then
            for file in hostdir/binpkgs/*.xbps; do
              [ -e "$file" ] || continue
              
              fname=$(basename "$file")
              PKGVER=$(echo "$fname" | sed -E 's/\.[^.]+\.xbps$//')
              
              PLIST=$(tar xOf "$file" ./props.plist 2>/dev/null || tar xOf "$file" props.plist 2>/dev/null || zstdcat "$file" | tar xOf - ./props.plist 2>/dev/null || zstdcat "$file" | tar xOf - props.plist 2>/dev/null || true)
              
              SHLIBS=$(echo "$PLIST" | awk '/<key>shlib-provides<\/key>/{flag=1; next} /<\/array>/{flag=0} flag && /<string>/{gsub(/.*<string>|<\/string>.*/, ""); print}' || true)
              
              for so in $SHLIBS; do
                echo "$so $PKGVER" >> "$TMP_SHLIBS"
              done
            done
          fi
          
          if [ -s "$TMP_SHLIBS" ]; then
            cat common/shlibs "$TMP_SHLIBS" | sort -u > /tmp/merged_shlibs
            mv /tmp/merged_shlibs common/shlibs
            echo "Successfully injected new shlibs! Total entries now: $(wc -l < common/shlibs)"
          fi
          rm -f "$TMP_SHLIBS"

      - name: Check if Binary Already Exists (Zero-Compile)
        id: check_bin
        run: |
          TARGET="${{ env.TARGET_PKG }}"
          TMPL="srcpkgs/$TARGET/template"
          if [ -f "$TMPL" ]; then
            VER=$(grep '^version=' "$TMPL" | head -1 | cut -d= -f2 | tr -d '"'"'")
            REV=$(grep '^revision=' "$TMPL" | head -1 | cut -d= -f2 | tr -d '"'"'")
            EXPECTED_PKG="${TARGET}-${VER}_${REV}.x86_64.xbps"
            if [ -f "hostdir/binpkgs/${EXPECTED_PKG}" ]; then
              echo "Binary ${EXPECTED_PKG} found in cache. Skipping build."
              echo "skip_build=true" >> $GITHUB_OUTPUT
            else
              echo "skip_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check_bin.outputs.skip_build != 'true'
        run: ./xbps-src pkg "${{ env.TARGET_PKG }}"

      - name: Sign and Index New Repository
        run: |
          set -e
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem
          mkdir -p public/x86_64
          
          ls -1 custom-templates-temp/ | while read -r pkg_name; do
            [ ! -d "custom-templates-temp/$pkg_name" ] && continue
            tmpl="custom-templates-temp/$pkg_name/template"
            [ ! -f "$tmpl" ] && continue
            ver=$(grep '^version=' "$tmpl" | head -1 | cut -d= -f2 | tr -d '"'"'")
            rev=$(grep '^revision=' "$tmpl" | head -1 | cut -d= -f2 | tr -d '"'"'")
            
            find hostdir/binpkgs -maxdepth 1 -type f -name "${pkg_name}-${ver}_${rev}.x86_64.xbps" -exec cp {} public/x86_64/ \; 2>/dev/null || true
            find hostdir/binpkgs -maxdepth 1 -type f -name "${pkg_name}-${ver}_${rev}.x86_64.xbps.sig2" -exec cp {} public/x86_64/ \; 2>/dev/null || true
          done

          cd public/x86_64
          if ls *.xbps 1>/dev/null 2>&1; then
            for pkg in *.xbps; do
              if [ ! -f "${pkg}.sig2" ]; then
                xbps-rindex --privkey /tmp/private.pem --sign-pkg "$pkg" || true
              fi
            done
            
            echo "Generating index for $(ls *.xbps | wc -l) packages..."
            xbps-rindex -f -a *.xbps || true
            xbps-rindex --privkey /tmp/private.pem --signedby "Void Nexus Build Bot <actions@github.com>" --sign . || true
          fi
          rm -f /tmp/private.pem

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: void-repo
          path: public/x86_64/

  deploy:
    name: Deploy and Relay
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: void-repo
          path: repo/
          
      - name: Deploy to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view rolling || gh release create rolling --title "Void Nexus Rolling" --notes "Automated XBPS Binaries"
          find repo/ -type f -exec gh release upload rolling {} --clobber \;
          
      - name: Trigger Next Package in Queue (Relay Race)
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          LIST="${{ github.event.inputs.package_list }}"
          read -r -a PKGS <<< "$LIST"
          REMAINING="${PKGS[@]:1}"
          if [ -n "$REMAINING" ]; then
            echo "Relaying to next packages: $REMAINING"
            gh workflow run "Build and Deploy Custom XBPS" --ref "${GITHUB_REF_NAME}" -f package_list="$REMAINING"
          else
            echo "Queue finished."
          fi
