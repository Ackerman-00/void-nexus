name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of packages to build'
        required: true
      force_rebuild:
        description: 'Force recompile even if binary exists in Release'
        type: boolean
        required: false
        default: false

env:
  NODE_OPTIONS: '--no-warnings'

jobs:
  build:
    name: Build and Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    defaults:
      run:
        shell: bash
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '0'

    steps:
      - name: Prepare container
        shell: sh
        run: |
          set -e
          REPO="https://repo-default.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || true
          xbps-install -S -R "$REPO" -yu || true
          # libarchive provides bsdtar, which natively reads modern xbps compression
          xbps-install -S -R "$REPO" -y bash curl git grep openssl tar xz shadow sudo base-devel file github-cli zstd libarchive
          git config --global --add safe.directory '*'

      - name: Clone void-packages
        run: |
          set -e
          rm -rf .[!.]* * 2>/dev/null || true
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          ln -s / masterdir
          echo "x86_64" > /.xbps_chroot_init
          echo "XBPS_CHROOT_CMD=ethereal" >> etc/conf
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
          echo "XBPS_MAKEJOBS=$(nproc)" >> etc/conf
          rm -f common/hooks/pre-pkg/99-pkglint.sh

      - name: Inject Real-Time Shlibs Hook
        run: |
          mkdir -p common/hooks/post-pkg
          cat << 'EOF' > common/hooks/post-pkg/99-shlibs-inject.sh
          hook() {
            local pkg_file="$XBPS_REPOSITORY/${pkgname}-${version}_${revision}.${XBPS_TARGET_MACHINE}.xbps"
            if [ -f "$pkg_file" ]; then
               echo "=> ${pkgname}: Dynamically injecting shlibs from ${pkg_file}..."
               # Native bsdtar completely prevents SIGPIPE/Error 39 crashes
               local new_shlibs=$( \
                 bsdtar xOf "$pkg_file" props.plist 2>/dev/null \
                 | awk -F'[><]' \
                    '/<key>shlib-provides<\/key>/ { p=1; next } \
                     /<\/array>/ { p=0; next } \
                     p && /<string>/ { print $3 }' \
                 || true \
               )
               for so in $new_shlibs; do
                 echo "$so ${pkgname}-${version}_${revision}" >> $XBPS_DISTDIR/common/shlibs
                 echo "   -> Successfully Injected: $so"
               done
            fi
          }
          EOF
          chmod +x common/hooks/post-pkg/99-shlibs-inject.sh

      - name: Checkout custom templates
        run: |
          git clone --depth=1 \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            custom-templates-temp

      - name: Parse Package List
        run: |
          LIST="${{ github.event.inputs.package_list }}"
          read -r -a PKGS <<< "$LIST"
          TARGET_PKG="${PKGS[0]}"
          echo "TARGET_PKG=$TARGET_PKG" >> $GITHUB_ENV
          echo "PACKAGE_LIST=$LIST" >> $GITHUB_ENV
          echo "FORCE_REBUILD=${{ github.event.inputs.force_rebuild }}" >> $GITHUB_ENV

      - name: Inject custom templates
        run: |
          set -e
          find custom-templates-temp -maxdepth 2 -name "template" | while read -r tmpl; do
            pkg_dir=$(dirname "$tmpl")
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            mkdir -p "srcpkgs/$pkg_name"
            cp -a "$pkg_dir/." "srcpkgs/$pkg_name/"
          done

      - name: Create subpackage symlinks
        run: |
          set -e
          mkdir -p srcpkgs
          # Only process templates from our repo — avoid void-packages' own templates
          # whose subpackages already have symlinks in the upstream repo.
          find custom-templates-temp -maxdepth 2 -name template | while read -r tmpl; do
            pkg_name=$(basename "$(dirname "$tmpl")")
            [ "$pkg_name" = ".github" ] && continue
            [ ! -d "srcpkgs/$pkg_name" ] && continue
            # Read full subpackages= value, joining continuation lines
            subpkgs=$(awk '
              /^subpackages=/ {
                val = $0
                while (getline nxt > 0) {
                  if (nxt ~ /^[[:space:]]+[^[:space:]]/) {
                    val = val nxt
                  } else {
                    break
                  }
                }
                gsub(/"/, "", val)
                gsub(/^subpackages=/, "", val)
                print val
                exit
              }
            ' "$tmpl" 2>/dev/null || true)
            if [ -n "$subpkgs" ]; then
              for sub in $subpkgs; do
                [ -n "$sub" ] && [ ! -e "srcpkgs/$sub" ] && ln -sf "$pkg_name" "srcpkgs/$sub"
              done
            fi
          done

      - name: Restore Repository from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p hostdir/binpkgs
          echo "Downloading existing packages from rolling release..."
          gh release download rolling -p "*.xbps" --repo ${{ github.repository }} --dir hostdir/binpkgs 2>/dev/null || echo "First run or no packages found."
          if ls hostdir/binpkgs/*.xbps 1>/dev/null 2>&1; then
            cd hostdir/binpkgs
            xbps-rindex -a *.xbps || true
            cd ../..
          fi
          echo "repository=/__w/void-nexus/void-nexus/hostdir/binpkgs" >> etc/conf

      - name: Build self-healing shlibs map
        run: |
          echo "Generating shlibs map by directly extracting props.plist from binaries..."
          touch common/shlibs
          TMP_SHLIBS=$(mktemp)
          if ls hostdir/binpkgs/*.xbps 1>/dev/null 2>&1; then
            for file in hostdir/binpkgs/*.xbps; do
              [ -e "$file" ] || continue
              fname=$(basename "$file")
              PKGVER=$(echo "$fname" | sed -E 's/\.[^.]+\.xbps$//')
              PLIST=$(bsdtar xOf "$file" props.plist 2>/dev/null || true)
              SHLIBS=$(echo "$PLIST" | \
                       awk -F'[><]' \
                          '/<key>shlib-provides<\/key>/ { p=1; next } \
                           /<\/array>/ { p=0; next } \
                           p && /<string>/ { print $3 }' \
                       || true)
              for so in $SHLIBS; do echo "$so $PKGVER" >> "$TMP_SHLIBS"; done
            done
          fi
          if [ -s "$TMP_SHLIBS" ]; then
            cat common/shlibs "$TMP_SHLIBS" | sort -u > /tmp/merged_shlibs
            mv /tmp/merged_shlibs common/shlibs
            echo "Successfully injected new shlibs! Total entries now: $(wc -l < common/shlibs)"
          fi
          rm -f "$TMP_SHLIBS"

      - name: Check if Binary Already Exists (Zero-Compile)
        id: check_bin
        run: |
          # Evaluates dynamic version strings like ${_basever}+git${_gitdate}.${_shortcommit}
          # Uses native Bash parameter expansion — safe against special chars in pkg names.
          get_evaluated_version() {
            local tmpl="$1"
            local ver _basever _commit _shortcommit _gitdate

            ver=$(grep '^version=' "$tmpl" | head -1 | sed 's/^version=//' | tr -d '"'"'" | xargs)
            _basever=$(grep '^_basever=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_basever=//' | tr -d '"'"'" | xargs)
            _commit=$(grep '^_commit=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_commit=//' | tr -d '"'"'" | xargs)
            _shortcommit=$(grep '^_shortcommit=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_shortcommit=//' | tr -d '"'"'" | xargs)
            _gitdate=$(grep '^_gitdate=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_gitdate=//' | tr -d '"'"'" | xargs)

            # Bash parameter expansion is literal — no regex injection possible
            ver="${ver/\$\{_basever\}/$_basever}"
            ver="${ver/\$\{_commit\}/$_commit}"
            ver="${ver/\$\{_shortcommit\}/$_shortcommit}"
            ver="${ver/\$\{_gitdate\}/$_gitdate}"
            ver="${ver/\$_basever/$_basever}"
            ver="${ver/\$_commit/$_commit}"
            ver="${ver/\$_shortcommit/$_shortcommit}"
            ver="${ver/\$_gitdate/$_gitdate}"

            echo "$ver"
          }

          TARGET="${{ env.TARGET_PKG }}"
          TMPL="srcpkgs/$TARGET/template"
          if [ -f "$TMPL" ]; then
            VER=$(get_evaluated_version "$TMPL")
            REV=$(grep '^revision=' "$TMPL" | head -1 | sed 's/^revision=//' | tr -d '"'"'" | xargs)
            EXPECTED_PKG="${TARGET}-${VER}_${REV}.x86_64.xbps"
            echo "Resolved expected binary: $EXPECTED_PKG"
            if [ "${{ env.FORCE_REBUILD }}" == "true" ]; then
              echo "Force rebuild enabled; not skipping $EXPECTED_PKG even if it exists."
              echo "skip_build=false" >> "$GITHUB_OUTPUT"
            elif [ -f "hostdir/binpkgs/${EXPECTED_PKG}" ]; then
              echo "Binary ${EXPECTED_PKG} found in cache. Skipping build."
              echo "skip_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "Binary ${EXPECTED_PKG} not found. Will build."
              echo "skip_build=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Template not found at $TMPL. Will attempt build anyway."
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.check_bin.outputs.skip_build != 'true'
        run: ./xbps-src pkg "${{ env.TARGET_PKG }}"

      - name: Build and Upload Signed Repo to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          # Same dynamic version resolver as above — defined here so this step is self-contained
          get_evaluated_version() {
            local tmpl="$1"
            local ver _basever _commit _shortcommit _gitdate

            ver=$(grep '^version=' "$tmpl" | head -1 | sed 's/^version=//' | tr -d '"'"'" | xargs)
            _basever=$(grep '^_basever=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_basever=//' | tr -d '"'"'" | xargs)
            _commit=$(grep '^_commit=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_commit=//' | tr -d '"'"'" | xargs)
            _shortcommit=$(grep '^_shortcommit=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_shortcommit=//' | tr -d '"'"'" | xargs)
            _gitdate=$(grep '^_gitdate=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_gitdate=//' | tr -d '"'"'" | xargs)

            ver="${ver/\$\{_basever\}/$_basever}"
            ver="${ver/\$\{_commit\}/$_commit}"
            ver="${ver/\$\{_shortcommit\}/$_shortcommit}"
            ver="${ver/\$\{_gitdate\}/$_gitdate}"
            ver="${ver/\$_basever/$_basever}"
            ver="${ver/\$_commit/$_commit}"
            ver="${ver/\$_shortcommit/$_shortcommit}"
            ver="${ver/\$_gitdate/$_gitdate}"

            echo "$ver"
          }

          mkdir -p public/x86_64

          # Copy newly built packages and purge old versions of each from the release
          ls -1 custom-templates-temp/ | while read -r pkg_name; do
            [ ! -d "custom-templates-temp/$pkg_name" ] && continue
            tmpl="custom-templates-temp/$pkg_name/template"
            [ ! -f "$tmpl" ] && continue

            ver=$(get_evaluated_version "$tmpl")
            rev=$(grep '^revision=' "$tmpl" | head -1 | sed 's/^revision=//' | tr -d '"'"'" | xargs)
            EXPECTED_PKG="${pkg_name}-${ver}_${rev}.x86_64.xbps"

            if [ ! -f "hostdir/binpkgs/$EXPECTED_PKG" ]; then
              echo ">>> $pkg_name: expected binary $EXPECTED_PKG not found, skipping."
              continue
            fi

            cp "hostdir/binpkgs/$EXPECTED_PKG" public/x86_64/
            echo ">>> Copied $EXPECTED_PKG to public/x86_64/"

            # PURGE OLD ASSETS: use awk for literal matching — safe against regex special chars
            # in package names (e.g. c++, libstdc++)
            echo ">>> Purging old versions of $pkg_name from GitHub Release..."
            OLD_XBPS=$(gh release view rolling --json assets \
              --jq '.assets[].name' --repo "$REPO" 2>/dev/null \
              | awk -v pkg="${pkg_name}-" 'index($0, pkg) == 1 && /\.x86_64\.xbps$/' \
              || true)
            for asset in $OLD_XBPS; do
              if [ "$asset" != "$EXPECTED_PKG" ]; then
                echo "  Deleting old binary: $asset"
                gh release delete-asset rolling "$asset" --repo "$REPO" -y 2>/dev/null || true
              fi
            done

            OLD_SIGS=$(gh release view rolling --json assets \
              --jq '.assets[].name' --repo "$REPO" 2>/dev/null \
              | awk -v pkg="${pkg_name}-" 'index($0, pkg) == 1 && /\.x86_64\.xbps\.sig2$/' \
              || true)
            for sig in $OLD_SIGS; do
              if [ "$sig" != "${EXPECTED_PKG}.sig2" ]; then
                echo "  Deleting old signature: $sig"
                gh release delete-asset rolling "$sig" --repo "$REPO" -y 2>/dev/null || true
              fi
            done
          done

          cd public/x86_64
          if ! ls *.xbps 1>/dev/null 2>&1; then
            echo "No .xbps files to upload. Exiting."
            exit 0
          fi

          echo "Generating fresh RSA signatures for all packages..."
          rm -f *.sig2
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem
          for pkg in *.xbps; do
            xbps-rindex --privkey /tmp/private.pem --sign-pkg "$pkg" || true
          done

          echo "Generating repodata index..."
          xbps-rindex -f -a *.xbps || true
          xbps-rindex --privkey /tmp/private.pem \
            --signedby "Void Nexus Build Bot <actions@github.com>" \
            --sign . || true

          echo "Generating packages.json for the website..."
          # Extract name and version from props.plist inside each .xbps for accuracy —
          # avoids the broken "fname##*-" split that fails on names containing dashes (e.g. niri-git).
          echo "[" > packages.json
          first=1
          for pkg in *.xbps; do
            [ -e "$pkg" ] || continue
            # Extract pkgver field: e.g. "niri-git-26.04+git20260601120000.abc1234_1"
            pkgver=$(bsdtar xOf "$pkg" props.plist 2>/dev/null \
              | awk -F'[><]' '
                  /<key>pkgver<\/key>/ { getline; print $3; exit }
              ' || true)
            if [ -z "$pkgver" ]; then
              # Fallback: derive from filename (strip arch and extension)
              pkgver=$(basename "$pkg" .x86_64.xbps)
            fi
            # Strip trailing _<revision> to get name-version, then split on last dash
            pkgver_no_rev="${pkgver%_*}"
            pkg_version="${pkgver_no_rev##*-}"
            pkg_name="${pkgver_no_rev%-${pkg_version}}"
            if [ "$first" -eq 0 ]; then echo "," >> packages.json; fi
            echo -n "  {\"name\": \"$pkg_name\", \"version\": \"$pkg_version\"}" >> packages.json
            first=0
          done
          echo -e "\n]" >> packages.json

          # Create release if it doesn't exist yet
          gh release view rolling -R "$REPO" 2>/dev/null \
            || gh release create rolling -R "$REPO" \
                 --title "Void Nexus Rolling Binaries" \
                 --notes "Automated XBPS Repository" \
                 --prerelease

          echo "Uploading XBPS repo files to GitHub Release..."

          retry_upload() {
            local file="$1"
            local max_retries=3
            for i in $(seq 1 $max_retries); do
              if gh release upload rolling -R "$REPO" "$file" --clobber 2>&1; then
                return 0
              fi
              sleep 5
            done
            echo "::error::Failed to upload $file after $max_retries attempts"
            return 1
          }

          retry_upload "x86_64-repodata"

          for pkg in *.xbps; do
            retry_upload "$pkg"
          done

          for sig in *.sig2; do
            [ -f "$sig" ] && retry_upload "$sig"
          done

          retry_upload "packages.json"

          rm -f /tmp/private.pem

      - name: Trigger Relay Race (next package in queue)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LIST="${{ env.PACKAGE_LIST }}"
          read -r -a PKGS <<< "$LIST"
          REMAINING="${PKGS[@]:1}"
          if [ -n "$REMAINING" ]; then
            echo "Relaying to next packages: $REMAINING"
            gh workflow run "Build and Deploy Custom XBPS" \
              --ref "${GITHUB_REF_NAME}" \
              --repo "${{ github.repository }}" \
              -f package_list="$REMAINING" \
              -f force_rebuild="${{ env.FORCE_REBUILD }}"
          else
            echo "Build queue finished."
          fi
