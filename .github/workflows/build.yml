name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package to build'
        required: true

concurrency:
  group: build-repo-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-warnings'

jobs:
  build:
    name: Build & Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    defaults:
      run:
        shell: bash
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '0'
    steps:
      - name: Prepare container
        shell: sh
        run: |
          set -e
          REPO="https://repo-default.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || true
          xbps-install -S -R "$REPO" -yu || true
          xbps-install -S -R "$REPO" -y bash curl git grep openssl tar xz shadow sudo base-devel file
          git config --global --add safe.directory '*'

      - name: Clone void-packages
        run: |
          set -e
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          ln -s / masterdir
          echo "x86_64" > /.xbps_chroot_init
          echo "XBPS_CHROOT_CMD=ethereal" >> etc/conf
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
          echo "XBPS_MAKEJOBS=$(nproc)" >> etc/conf
          
          # --- FIRE THE VOID POLICE ---
          # This script strictly crashes builds if it detects automated library version bumps. 
          # We delete it so the Action can build new versions without throwing an error.
          rm -f common/hooks/pre-pkg/99-pkglint.sh

      - name: Cache repository
        uses: actions/cache@v4
        with:
          path: public/x86_64
          key: public-x86_64-${{ github.run_id }}
          restore-keys: public-x86_64-

      - name: Checkout custom templates
        uses: actions/checkout@v5
        with:
          path: custom-templates-temp

      - name: Inject custom templates
        run: |
          set -e
          find custom-templates-temp -maxdepth 2 -name "template" | while read -r tmpl; do
            pkg_dir=$(dirname "$tmpl")
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            cp -r "$pkg_dir" srcpkgs/
          done

      - name: Restore existing repository
        run: |
          if [ -f public/x86_64/x86_64-repodata ]; then
            echo "Cache hit — skipping download"
            exit 0
          fi
          PAGES_URL="https://ackerman-00.github.io/void-nexus"
          mkdir -p public/x86_64
          if curl -sfL "${PAGES_URL}/x86_64/x86_64-repodata" -o public/x86_64/x86_64-repodata; then
            REPO_DIR="$PWD/public/x86_64"
            set +o pipefail || true
            xbps-query --repository="$REPO_DIR" -l 2>/dev/null | awk '{print $2}' > /tmp/pkgs.txt || true
            while IFS= read -r pkg; do
              [ -z "$pkg" ] && continue
              fname=$(xbps-query --repository="$REPO_DIR" -p filename "$pkg" 2>/dev/null) || continue
              [ -z "$fname" ] && continue
              curl -sfL "${PAGES_URL}/x86_64/${fname}" -o "public/x86_64/${fname}" || true
              curl -sfL "${PAGES_URL}/x86_64/${fname}.sig2" -o "public/x86_64/${fname}.sig2" || true
            done < /tmp/pkgs.txt
            set -o pipefail || true
          fi

      - name: Build self-healing shlibs map
        run: |
          if ! ls public/x86_64/*.xbps 1>/dev/null 2>&1; then
            echo "No existing packages — skipping shlibs map"
            exit 0
          fi
          echo "Building shlibs map from existing packages..."
          
          # Only remove lines we're about to re-add (preserve any manual entries)
          TMP_SHLIBS=$(mktemp)
          for file in public/x86_64/*.xbps; do
            fname=$(basename "$file")
            
            # Parse pkgver safely from filename
            pkg_full=$(echo "$fname" | sed -E 's/\.[^.]+\.xbps$//')
            REPO_DIR="$PWD/public/x86_64"
            
            PKGVER=$(xbps-query --repository="$REPO_DIR" -p pkgver "$pkg_full" 2>/dev/null || echo "")
            [ -z "$PKGVER" ] && continue
            
            SHLIBS=$(xbps-query --repository="$REPO_DIR" -p shlib-provides "$pkg_full" 2>/dev/null || echo "")
            for so in $SHLIBS; do
              echo "$so $PKGVER" >> "$TMP_SHLIBS"
            done
          done
          
          # Merge: keep existing manual shlibs entries, append new ones, deduplicate
          if [ -f common/shlibs ]; then
            cat common/shlibs "$TMP_SHLIBS" | sort -u > /tmp/merged_shlibs
          else
            sort -u "$TMP_SHLIBS" > /tmp/merged_shlibs
          fi
          
          mv /tmp/merged_shlibs common/shlibs
          echo "Shlibs map ready:"
          cat common/shlibs
          rm -f "$TMP_SHLIBS"

      - name: Build package
        run: ./xbps-src pkg "${{ github.event.inputs.package_name }}"

      - name: Sign and index repository
        run: |
          set -e
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem

          echo "=== FILTERING PACKAGES ==="
          mkdir -p public/clean_x86_64
          
          ls -1 custom-templates-temp/ | while read -r pkg_name; do
            [ "$pkg_name" = ".github" ] && continue
            [ "$pkg_name" = "README.md" ] && continue
            [ "$pkg_name" = "index.html" ] && continue
            
            find hostdir/binpkgs public/x86_64 -maxdepth 1 -type f -name "${pkg_name}-[0-9]*.xbps" -exec cp {} public/clean_x86_64/ \; 2>/dev/null || true
          done

          rm -rf public/x86_64
          mv public/clean_x86_64 public/x86_64

          echo "=== SIGNING REPOSITORY ==="
          cd public/x86_64
          
          if ls *.xbps 1>/dev/null 2>&1; then
            xbps-rindex --privkey /tmp/private.pem --sign-pkg *.xbps
            xbps-rindex -f -a *.xbps
            xbps-rindex --privkey /tmp/private.pem --signedby "Void Nexus Build Bot <actions@github.com>" --sign .
          fi

          echo "=== GENERATING UI DATA ==="
          cd ..
          if [ -f ../custom-templates-temp/index.html ]; then
            cp ../custom-templates-temp/index.html ./
          fi
          
          echo "[" > packages.json
          first=1
          
          for file in x86_64/*.xbps; do
            [ -e "$file" ] || continue
            
            fname=$(basename "$file")
            pkg_full=$(echo "$fname" | sed -E 's/\.[^.]+\.xbps$//')
            
            name=$(xbps-query --repository=./x86_64 -p pkgname "$pkg_full" 2>/dev/null || echo "")
            name=$(echo "$name" | tr -d '\n\r')
            if [ -z "$name" ]; then
              name=$(echo "$pkg_full" | sed -r 's/-[0-9].*//')
            fi
            
            ver=$(xbps-query --repository=./x86_64 -p version "$pkg_full" 2>/dev/null || echo "")
            ver=$(echo "$ver" | sed "s/^$name-//" | tr -d '\n\r')
            if [ -z "$ver" ]; then
              ver=$(echo "$pkg_full" | sed -r "s/^$name-//")
            fi
            
            desc=$(xbps-query --repository=./x86_64 -p short_desc "$pkg_full" 2>/dev/null || echo "")
            # THE JSON ESCAPE FIX: Backslashes first, then quotes!
            desc=$(echo "$desc" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | tr -d '\n\r')
            if [ -z "$desc" ]; then
              desc="Custom compiled Void package"
            fi
            
            [ "$first" -eq 0 ] && echo "," >> packages.json
            first=0
            echo "  {\"name\": \"$name\", \"version\": \"$ver\", \"description\": \"$desc\"}" >> packages.json
          done
          echo "]" >> packages.json

          echo "=== JSON GENERATED ==="
          cat packages.json

          rm -f /tmp/private.pem

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
