name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package to build (e.g., vesktop)'
        required: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build & Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '1'
    steps:
      - name: Prepare container
        run: |
          REPO="https://repo-fastly.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || xbps-install -S -R "$REPO" -yu xbps
          xbps-install -S -R "$REPO" -yu
          xbps-install -S -R "$REPO" -y sudo bash curl git grep openssl
          useradd -G xbuilder -M builder

      - name: Clone Official Void-Packages
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          chown -R builder:builder .

      - name: Checkout Your Custom Templates
        uses: actions/checkout@v5
        with:
          path: custom-templates-temp

      - name: Inject Template
        run: |
          cp -r custom-templates-temp/${{ github.event.inputs.package_name }} srcpkgs/
          mkdir -p etc
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
          chown -R builder:builder .

      - name: Prepare Masterdir
        run: |
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Build Package
        run: |
          # Tell the build script exactly which package to compile
          echo "${{ github.event.inputs.package_name }}" > /tmp/templates
          sudo -Eu builder common/travis/build.sh "$BOOTSTRAP" "$ARCH" "$TEST"

      - name: Setup Private Key for Signing
        run: |
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem

      - name: Sign & Index Repository
        run: |
          mkdir -p public/x86_64
          
          # File copy process
          find hostdir/binpkgs -name "*.xbps" -exec cp {} public/x86_64/ \;
          cd public/x86_64
          
          # Sign each package
          xbps-rindex --privkey /tmp/private.pem --sign-pkg *.xbps
          
          # Create the repodata index
          xbps-rindex -a *.xbps
          
          # Add --signedby flag to initialize signed repository
          xbps-rindex --privkey /tmp/private.pem --signedby "GitHub Actions <actions@github.com>" --sign .
          
          # Clean up the key
          rm /tmp/private.pem

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
