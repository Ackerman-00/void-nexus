name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of packages to build'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: '--no-warnings'

jobs:
  build:
    name: Build and Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    defaults:
      run:
        shell: bash
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '0'
    steps:
      - name: Prepare container
        shell: sh
        run: |
          set -e
          REPO="https://repo-default.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || true
          xbps-install -S -R "$REPO" -yu || true
          xbps-install -S -R "$REPO" -y bash curl git grep openssl tar xz shadow sudo base-devel file
          git config --global --add safe.directory '*'

      - name: Clone void-packages
        run: |
          set -e
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          ln -s / masterdir
          echo "x86_64" > /.xbps_chroot_init
          echo "XBPS_CHROOT_CMD=ethereal" >> etc/conf
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
          echo "XBPS_MAKEJOBS=$(nproc)" >> etc/conf
          rm -f common/hooks/pre-pkg/99-pkglint.sh

      - name: Checkout custom templates
        uses: actions/checkout@v4
        with:
          path: custom-templates-temp

      - name: Parse Package List
        run: |
          LIST="${{ github.event.inputs.package_list }}"
          read -r -a PKGS <<< "$LIST"
          echo "TARGET_PKG=${PKGS}" >> $GITHUB_ENV

      - name: Inject custom templates
        run: |
          set -e
          find custom-templates-temp -maxdepth 2 -name "template" | while read -r tmpl; do
            pkg_dir=$(dirname "$tmpl")
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            cp -r "$pkg_dir" srcpkgs/
          done

      - name: Restore Repository & Setup Dependency Cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. We create the official binpkgs folder
          mkdir -p hostdir/binpkgs
          
          # 2. FIX FOR THE BROKEN INDEX:
          # Instead of reading the broken repodata, we force download ALL .xbps and .sig2 files 
          # directly from the GitHub Release. This recovers all "missing" packages.
          gh release download rolling -p "*.xbps" -p "*.sig2" -p "*-repodata" --repo ${{ github.repository }} --dir hostdir/binpkgs || true
          
          # 3. FIX FOR SHLIBS ERROR:
          # We index the downloaded packages locally so xbps-src treats them as a real repo.
          # When hyprlang builds, xbps-src will auto-discover libhyprutils.so.11 from this folder.
          if ls hostdir/binpkgs/*.xbps 1>/dev/null 2>&1; then
            cd hostdir/binpkgs
            xbps-rindex -a *.xbps || true
            cd ../..
          fi
          
          # Tell xbps-src to use this cache as an official repository
          echo "repository=/__w/void-nexus/void-nexus/hostdir/binpkgs" >> etc/conf

      - name: Check if Binary Already Exists (Zero-Compile)
        id: check_bin
        run: |
          TARGET="${{ env.TARGET_PKG }}"
          TMPL="srcpkgs/$TARGET/template"
          if [ -f "$TMPL" ]; then
            VER=$(grep '^version=' "$TMPL" | head -1 | cut -d= -f2 | tr -d '"'"'")
            REV=$(grep '^revision=' "$TMPL" | head -1 | cut -d= -f2 | tr -d '"'"'")
            EXPECTED_PKG="${TARGET}-${VER}_${REV}.x86_64.xbps"
            if [ -f "hostdir/binpkgs/${EXPECTED_PKG}" ]; then
              echo "Binary ${EXPECTED_PKG} found in cache. Skipping build."
              echo "skip_build=true" >> $GITHUB_OUTPUT
            else
              echo "skip_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check_bin.outputs.skip_build != 'true'
        run: ./xbps-src pkg "${{ env.TARGET_PKG }}"

      - name: Sign and Index New Repository
        run: |
          set -e
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem
          mkdir -p public/x86_64
          
          # Filter: Only copy binaries from hostdir/binpkgs into public/x86_64 
          # if they match the current template versions. This prevents old versions from piling up.
          ls -1 custom-templates-temp/ | while read -r pkg_name; do
            [ ! -d "custom-templates-temp/$pkg_name" ] && continue
            tmpl="custom-templates-temp/$pkg_name/template"
            [ ! -f "$tmpl" ] && continue
            ver=$(grep '^version=' "$tmpl" | head -1 | cut -d= -f2 | tr -d '"'"'")
            rev=$(grep '^revision=' "$tmpl" | head -1 | cut -d= -f2 | tr -d '"'"'")
            
            find hostdir/binpkgs -maxdepth 1 -type f -name "${pkg_name}-${ver}_${rev}.x86_64.xbps" -exec cp {} public/x86_64/ \; 2>/dev/null || true
            find hostdir/binpkgs -maxdepth 1 -type f -name "${pkg_name}-${ver}_${rev}.x86_64.xbps.sig2" -exec cp {} public/x86_64/ \; 2>/dev/null || true
          done

          # Rebuild the master index from scratch
          cd public/x86_64
          if ls *.xbps 1>/dev/null 2>&1; then
            for pkg in *.xbps; do
              if [ ! -f "${pkg}.sig2" ]; then
                xbps-rindex --privkey /tmp/private.pem --sign-pkg "$pkg" || true
              fi
            done
            xbps-rindex -f -a *.xbps || true
            xbps-rindex --privkey /tmp/private.pem --signedby "Void Nexus Build Bot <actions@github.com>" --sign . || true
          fi
          rm -f /tmp/private.pem

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: void-repo
          path: public/x86_64/

  deploy:
    name: Deploy and Relay
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: void-repo
          path: repo/
          
      - name: Deploy to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view rolling || gh release create rolling --title "Void Nexus Rolling" --notes "Automated XBPS Binaries"
          find repo/ -type f -exec gh release upload rolling {} --clobber \;
          
      - name: Trigger Next Package in Queue (Relay Race)
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          LIST="${{ github.event.inputs.package_list }}"
          read -r -a PKGS <<< "$LIST"
          REMAINING="${PKGS[@]:1}"
          if [ -n "$REMAINING" ]; then
            echo "Relaying to next packages: $REMAINING"
            gh workflow run "Build and Deploy Custom XBPS" --ref "${GITHUB_REF_NAME}" -f package_list="$REMAINING"
          else
            echo "Queue finished."
          fi
