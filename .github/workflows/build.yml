name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package to build'
        required: true

concurrency:
  group: build-repo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    defaults:
      run:
        shell: bash
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '0'
    steps:
      - name: Prepare container
        shell: sh
        run: |
          set -e
          REPO="https://repo-default.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || true
          xbps-install -S -R "$REPO" -yu || true
          xbps-install -S -R "$REPO" -y bash curl git grep openssl tar xz shadow sudo base-devel file
          git config --global --add safe.directory '*'

      - name: Clone void-packages
        run: |
          set -e
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          ln -s / masterdir
          echo "x86_64" > /.xbps_chroot_init
          echo "XBPS_CHROOT_CMD=ethereal" >> etc/conf
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
          echo "XBPS_MAKEJOBS=$(nproc)" >> etc/conf

      - name: Cache repository
        uses: actions/cache@v4
        with:
          path: public/x86_64
          key: public-x86_64-${{ github.run_id }}
          restore-keys: public-x86_64-

      - name: Checkout custom templates
        uses: actions/checkout@v5
        with:
          path: custom-templates-temp

      - name: Inject custom templates
        run: |
          set -e
          find custom-templates-temp -maxdepth 2 -name "template" | while read -r tmpl; do
            pkg_dir=$(dirname "$tmpl")
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            cp -r "$pkg_dir" srcpkgs/
          done

      - name: Restore existing repository
        run: |
          if [ -f public/x86_64/x86_64-repodata ]; then
            exit 0
          fi
          PAGES_URL="https://ackerman-00.github.io/void-nexus"
          mkdir -p public/x86_64
          if curl -sfL "${PAGES_URL}/x86_64/x86_64-repodata" -o public/x86_64/x86_64-repodata; then
            REPO_DIR="$PWD/public/x86_64"
            set +o pipefail || true
            xbps-query --repository="$REPO_DIR" -l 2>/dev/null | awk '{print $2}' > /tmp/pkgs.txt || true
            while IFS= read -r pkg; do
              [ -z "$pkg" ] && continue
              fname=$(xbps-query --repository="$REPO_DIR" -p filename "$pkg" 2>/dev/null) || continue
              [ -z "$fname" ] && continue
              curl -sfL "${PAGES_URL}/x86_64/${fname}" -o "public/x86_64/${fname}" || true
              curl -sfL "${PAGES_URL}/x86_64/${fname}.sig2" -o "public/x86_64/${fname}.sig2" || true
            done < /tmp/pkgs.txt
            set -o pipefail || true
          fi

      - name: Build package
        run: ./xbps-src pkg "${{ github.event.inputs.package_name }}"

      - name: Sign and index repository
        run: |
          set -e
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem

          find hostdir/binpkgs -type f -name "*.xbps" -exec cp {} public/x86_64/ \;

          cd public/x86_64
          if ls *.xbps 1>/dev/null 2>&1; then
            xbps-rindex --privkey /tmp/private.pem --sign-pkg *.xbps
            xbps-rindex -c $PWD
            xbps-rindex -a *.xbps
            xbps-rindex --privkey /tmp/private.pem --signedby "Void Nexus Build Bot <actions@github.com>" --sign .
          fi

          cd ..
          if [ -f ../custom-templates-temp/index.html ]; then
            cp ../custom-templates-temp/index.html ./
          fi
          
          echo "[" > packages.json
          first=1
          xbps-query --repository=./x86_64 -l 2>/dev/null | awk '{print $2}' | while read -r pkg_full; do
            [ -z "$pkg_full" ] && continue
            name=$(xbps-query --repository=./x86_64 -p pkgname "$pkg_full")
            
            # VIP FILTER: Only allow packages that have a custom template folder
            if [ ! -d "../custom-templates-temp/$name" ]; then
              continue
            fi
            
            [ "$first" -eq 0 ] && echo "," >> packages.json
            first=0
            ver=$(xbps-query --repository=./x86_64 -p version "$pkg_full" | sed "s/^$name-//")
            desc=$(xbps-query --repository=./x86_64 -p short_desc "$pkg_full" | sed 's/"/\\"/g' | sed 's/\\/\\\\/g')
            echo "  {\"name\": \"$name\", \"version\": \"$ver\", \"description\": \"$desc\"}" >> packages.json
          done
          echo "]" >> packages.json

          rm -f /tmp/private.pem

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
