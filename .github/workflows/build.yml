name: Gentoo Build Relay

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of package atoms to build'
        required: true
      force_rebuild:
        description: 'Force compile from source (ignores existing binary in Release)'
        type: boolean
        required: false
        default: false

concurrency:
  group: gentoo-build-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Prepare Persistent Directories
        run: |
          mkdir -p "${{ github.workspace }}/binpkgs"
          mkdir -p "${{ github.workspace }}/distfiles"
          mkdir -p "${{ github.workspace }}/ccache"

      - name: Cache ccache & distfiles ONLY
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/ccache
            ${{ github.workspace }}/distfiles
          key: gentoo-cache-${{ hashFiles('**/*.ebuild', 'metadata/**') }}
          restore-keys: gentoo-cache-

      - name: Get week stamp for Docker cache key
        id: week
        run: echo "stamp=$(date +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache gentoo/stage3 Docker image
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.docker-cache/gentoo-stage3.tar
          key: docker-gentoo-stage3-${{ steps.week.outputs.stamp }}
          restore-keys: docker-gentoo-stage3-

      - name: Pull or restore gentoo/stage3 image
        run: |
          mkdir -p "${{ github.workspace }}/.docker-cache"
          IMAGE_CACHE="${{ github.workspace }}/.docker-cache/gentoo-stage3.tar"
          if [ -f "$IMAGE_CACHE" ]; then
            echo ">>> Loading gentoo/stage3 from cache..."
            docker load -i "$IMAGE_CACHE"
          else
            echo ">>> Cache miss — pulling gentoo/stage3 from Docker Hub..."
            docker pull gentoo/stage3:amd64-desktop-openrc
            docker save gentoo/stage3:amd64-desktop-openrc -o "$IMAGE_CACHE"
          fi

      - name: Download Existing Binhost
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> Downloading existing packages from rolling release..."
          gh release download rolling -p "*.gpkg.tar" -p "Packages" --repo ${{ github.repository }} --dir "${{ github.workspace }}/binpkgs" --clobber || echo "First run or no packages found."

      - name: Check Existing Binaries & Pop Queue
        id: queue
        run: |
          read -r -a PKGS <<< "${{ github.event.inputs.package_list }}"
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild }}"
          MISSING=()
          
          for pkg in "${PKGS[@]}"; do
            PN=$(echo "$pkg" | sed 's/^=//' | awk -F/ '{print $NF}' | sed -E 's/-[0-9]+(\.[0-9]+)*(_[a-z0-9]+)?(-r[0-9]+)?$//')
            if [ "$FORCE_REBUILD" == "true" ]; then
              MISSING+=("$pkg")
              rm -f "${{ github.workspace }}/binpkgs/${PN}-"[0-9]*.gpkg.tar 2>/dev/null || true
            elif ls "${{ github.workspace }}/binpkgs/${PN}-"[0-9]*.gpkg.tar 1> /dev/null 2>&1; then
              echo "✓ Found existing binary for $pkg"
            else
              MISSING+=("$pkg")
            fi
          done
          
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "target_pkg=${MISSING}" >> "$GITHUB_OUTPUT"
            echo "remaining_pkgs=${MISSING[@]:1}" >> "$GITHUB_OUTPUT"
          else
            echo "target_pkg=" >> "$GITHUB_OUTPUT"
            echo "remaining_pkgs=" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Overlays on Host Runner
        if: steps.queue.outputs.target_pkg != ''
        run: |
          git clone --depth 1 https://github.com/anyc/steam-overlay.git steam-overlay 2>/dev/null || true

      - name: Prepare Portage DNA Script
        if: steps.queue.outputs.target_pkg != ''
        env:
          PORTAGE_DNA: |
            #!/bin/bash
            set -euo pipefail
            OWNER="${GITHUB_REPOSITORY_OWNER:-}"
            REPO="${GITHUB_REPOSITORY:-}"
            REPO_NAME="${REPO#*/}"
            mkdir -p /var/db/repos/{gentoo,steam-overlay}
            mkdir -p /etc/portage/{repos.conf,binrepos.conf,env,package.{accept_keywords,license,use,env}}
            
            # ✅ THE FIX: Nuke system defaults so they can't secretly re-enable GPG
            rm -rf /etc/portage/binrepos.conf/*
            rm -f /usr/share/portage/config/binrepos.conf || true
            
            # ✅ THE FIX: Explicitly disable signatures across ALL layers
            cat > /etc/portage/binrepos.conf/00-nexus.conf << EOF
            [DEFAULT]
            verify-signature = false
            
            [gentoo-nexus-releases]
            priority = 99999
            sync-uri = https://github.com/${OWNER}/${REPO_NAME}/releases/download/rolling/
            verify-signature = false
            
            [gentoobinhost]
            priority = 1
            sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
            verify-signature = false
            EOF
            
            # ✅ THE FIX: Add PORTAGE_TRUST_HELPER silencer and remove GPG FEATURES
            cat > /etc/portage/make.conf << 'EOF'
            COMMON_FLAGS="-O2 -march=x86-64-v3 -pipe"
            CFLAGS="${COMMON_FLAGS}"
            CXXFLAGS="${COMMON_FLAGS}"
            RUSTFLAGS="-C target-cpu=x86-64-v3 -C opt-level=2"
            USE="wayland X vulkan pipewire dbus udev opengl dri gbm vaapi vdpau ffmpeg minizip -daemon -aqua -cups -gpm"
            VIDEO_CARDS="amdgpu radeon radeonsi intel iris nouveau virgl"
            FEATURES="buildpkg parallel-install getbinpkg ccache -sandbox -usersandbox -ipc-sandbox -network-sandbox -pid-sandbox -binpkg-request-signature -binpkg-sigverify"
            PORTAGE_BINPKG_SIGVERIFY="0"
            PORTAGE_TRUST_HELPER="true"
            BINPKG_FORMAT="gpkg"
            PKGDIR="/var/cache/binpkgs"
            CCACHE_DIR="/var/cache/ccache"
            CCACHE_UMASK="002"
            DISTDIR="/var/cache/distfiles"
            ACCEPT_LICENSE="*"
            ACCEPT_KEYWORDS="~amd64"
            CONFIG_PROTECT_MASK="/etc/portage"
            EOF
            
            NPROC=$(nproc)
            echo "EMERGE_DEFAULT_OPTS=\"--getbinpkg --usepkg --autounmask=y --autounmask-write --autounmask-continue=y --keep-going --quiet-build=y --jobs=${NPROC} --load-average=${NPROC}\"" >> /etc/portage/make.conf
            echo "MAKEOPTS=\"-j${NPROC}\"" >> /etc/portage/make.conf
            
            # Sync without verifying the tarball
            emerge-webrsync --no-gpg-verify -q || true
            
            eselect profile set default/linux/amd64/23.0/desktop
            
            # Install native binaries without checks
            emerge --noreplace --quiet --getbinpkg --usepkg dev-util/ccache dev-vcs/git
            
            printf "[repo]\nrepo-name = steam-overlay\nmasters = gentoo\n" > /var/db/repos/steam-overlay/metadata/layout.conf
            cat > /etc/portage/repos.conf/steam-overlay.conf << 'EOF'
            [steam-overlay]
            location = /var/db/repos/steam-overlay
            masters = gentoo
            priority = 50
            EOF
            cat > /etc/portage/repos.conf/gentoo-nexus.conf << 'EOF'
            [gentoo-nexus]
            location = /overlay
            masters = gentoo
            priority = 9999
            EOF
            echo "*/*::steam-overlay **" > /etc/portage/package.accept_keywords/steam
            echo "*/*::gentoo-nexus **" > /etc/portage/package.accept_keywords/nexus
            cat >> /etc/portage/package.accept_keywords/nexus << 'EOF'
            media-libs/mesa ~amd64
            media-libs/vulkan-loader ~amd64
            dev-util/mesa_clc ~amd64
            dev-util/spirv-tools ~amd64
            dev-util/spirv-headers ~amd64
            dev-util/vulkan-headers ~amd64
            dev-util/glslang ~amd64
            dev-util/vulkan-utility-libraries ~amd64
            sys-kernel/gentoo-kernel ~amd64
            sys-kernel/linux-firmware ~amd64
            virtual/dist-kernel ~amd64
            EOF
            cat > /etc/portage/package.use/global << 'EOF'
            sys-libs/zlib minizip
            media-video/pipewire extra
            media-video/ffmpeg -sdl
            sys-libs/ncurses -gpm
            dev-libs/openssl -bindist
            games-util/steam-launcher steamruntime
            EOF
            cat > /etc/portage/env/no-lto << 'EOF'
            CFLAGS="-O1 -pipe -fno-lto -fno-tree-loop-vectorize -fno-tree-slp-vectorize"
            CXXFLAGS="-O1 -pipe -fno-lto -fno-tree-loop-vectorize -fno-tree-slp-vectorize"
            EOF
            echo "MAKEOPTS=\"-j${NPROC}\"" >> /etc/portage/env/no-lto
            cat > /etc/portage/package.env/no-lto-packages << 'EOF'
            dev-util/spirv-tools no-lto
            media-libs/mesa no-lto
            gui-libs/gtk no-lto
            dev-qt/qtbase no-lto
            dev-qt/qtwayland no-lto
            EOF
        run: |
          echo "$PORTAGE_DNA" > portage_dna.sh
          chmod +x portage_dna.sh

      - name: Build Target Package
        if: steps.queue.outputs.target_pkg != ''
        env:
          TARGET: ${{ steps.queue.outputs.target_pkg }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
          BUILD_SCRIPT: |
            #!/bin/bash
            set -euo pipefail
            source /overlay/portage_dna.sh
            emaint binhost --fix 2>/dev/null || true
            if [ "${FORCE_REBUILD}" == "true" ]; then
              emerge --getbinpkg --usepkg --buildpkg --usepkg-exclude "$1" "$1"
            else
              emerge --getbinpkg --usepkg --buildpkg "$1"
            fi
        run: |
          echo ">>> Building: $TARGET"
          echo "$BUILD_SCRIPT" > build_script.sh
          chmod +x build_script.sh
          docker run --rm --privileged \
            -e GITHUB_REPOSITORY_OWNER -e GITHUB_REPOSITORY -e FORCE_REBUILD \
            -v "${{ github.workspace }}:/overlay" \
            -v "${{ github.workspace }}/steam-overlay:/var/db/repos/steam-overlay" \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs" \
            -v "${{ github.workspace }}/distfiles:/var/cache/distfiles" \
            -v "${{ github.workspace }}/ccache:/var/cache/ccache" \
            gentoo/stage3:amd64-desktop-openrc \
            bash /overlay/build_script.sh "$TARGET"

      - name: Generate Unified Portage Index
        if: steps.queue.outputs.target_pkg != ''
        run: |
          if [ -z "$(find ${{ github.workspace }}/binpkgs -name '*.gpkg.tar' 2>/dev/null)" ]; then exit 0; fi
          docker run --rm \
            -v "${{ github.workspace }}/binpkgs:/var/cache/binpkgs" \
            gentoo/stage3:amd64-desktop-openrc \
            bash -c "mkdir -p /var/db/repos/gentoo/metadata && echo 'masters = gentoo' > /var/db/repos/gentoo/metadata/layout.conf && PKGDIR='/var/cache/binpkgs' emaint binhost --fix"

      - name: Deploy to GitHub Releases
        if: steps.queue.outputs.target_pkg != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$(find ${{ github.workspace }}/binpkgs -name '*.gpkg.tar' 2>/dev/null)" ]; then exit 0; fi
          gh release view rolling -R "$REPO" 2>/dev/null || \
            gh release create rolling -R "$REPO" --title "Nexus Rolling Binaries" --notes "Automated Gentoo Binhost" --prerelease
          find ${{ github.workspace }}/binpkgs -type f \( -name "*.gpkg.tar" -o -name "Packages" \) -exec gh release upload rolling -R "$REPO" {} --clobber \;

      - name: Fix Workspace Permissions for Cache
        if: always()
        run: sudo chown -R $USER:$USER ${{ github.workspace }}

      - name: Trigger Relay Race
        if: steps.queue.outputs.remaining_pkgs != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> Passing the baton to: ${{ steps.queue.outputs.remaining_pkgs }}"
          gh workflow run "Gentoo Build Relay" \
            --ref "${GITHUB_REF_NAME}" \
            -f package_list="${{ steps.queue.outputs.remaining_pkgs }}" \
            -f force_rebuild="${{ github.event.inputs.force_rebuild }}"
