name: Build Nexus XBPS
on:
  workflow_dispatch:
    inputs:
      package_list:
        description: 'Space-separated list of packages to build'
        required: true
      force_rebuild:
        description: 'Force recompile even if binary exists in Release'
        type: boolean
        required: false
        default: false

env:
  NODE_OPTIONS: '--no-warnings'

jobs:
  build:
    name: Build and Index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    defaults:
      run:
        shell: bash
    env:
      ARCH: 'x86_64'
      BOOTSTRAP: 'x86_64'
      TEST: '0'

    steps:
      - name: Prepare container
        shell: sh
        run: |
          set -e
          REPO="https://repo-default.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || true
          xbps-install -S -R "$REPO" -yu || true

      - name: Install dependencies
        shell: sh
        run: |
          set -e
          REPO="https://repo-default.voidlinux.org/current"
          xbps-install -S -R "$REPO" -y bash curl git grep openssl tar xz shadow sudo base-devel file github-cli zstd libarchive

      - name: Clone void-packages baseline
        run: |
          set -e
          git clone --depth=1 https://github.com/void-linux/void-packages.git /tmp/void-packages
          ln -s / /tmp/void-packages/masterdir
          echo "x86_64" > /.xbps_chroot_init
          echo "XBPS_CHROOT_CMD=ethereal" >> /tmp/void-packages/etc/conf
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> /tmp/void-packages/etc/conf
          echo "repository=/tmp/void-packages/hostdir/binpkgs" >> /tmp/void-packages/etc/conf

      - name: Clone self (our templates)
        run: |
          set -e
          git clone --depth=1 \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            custom-templates-temp

      - name: Parse Package List
        run: |
          LIST="${{ github.event.inputs.package_list }}"
          read -r -a PKGS <<< "$LIST"
          TARGET_PKG="${PKGS[0]}"
          echo "TARGET_PKG=$TARGET_PKG" >> $GITHUB_ENV
          echo "PACKAGE_LIST=$LIST" >> $GITHUB_ENV
          echo "FORCE_REBUILD=${{ github.event.inputs.force_rebuild }}" >> $GITHUB_ENV

      - name: Inject custom templates into void-packages
        run: |
          set -e
          find custom-templates-temp -maxdepth 3 -name "template" | while read -r tmpl; do
            pkg_dir=$(dirname "$tmpl")
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            [ "$pkg_name" = "srcpkgs" ] && continue
            mkdir -p "/tmp/void-packages/srcpkgs/$pkg_name"
            cp -a "$pkg_dir/." "/tmp/void-packages/srcpkgs/$pkg_name/"
          done

      - name: Create subpackage symlinks
        run: |
          set -e
          find custom-templates-temp -maxdepth 3 -name template | while read -r tmpl; do
            pkg_name=$(basename "$(dirname "$tmpl")")
            [ "$pkg_name" = ".github" ] && continue
            [ ! -d "/tmp/void-packages/srcpkgs/$pkg_name" ] && continue
            subpkgs=$(awk '
              /^subpackages=/ {
                val = $0
                while (getline nxt > 0) {
                  if (nxt ~ /^[[:space:]]+[^[:space:]]/) {
                    val = val nxt
                  } else {
                    break
                  }
                }
                gsub(/"/, "", val)
                gsub(/^subpackages=/, "", val)
                print val
                exit
              }
            ' "$tmpl" 2>/dev/null || true)
            if [ -n "$subpkgs" ]; then
              for sub in $subpkgs; do
                if [ -n "$sub" ] && [ ! -e "/tmp/void-packages/srcpkgs/$sub" ]; then
                  ln -sf "$pkg_name" "/tmp/void-packages/srcpkgs/$sub"
                fi
              done
            fi
          done

      - name: Restore Repository from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/void-packages/hostdir/binpkgs
          echo "Downloading existing packages from rolling release..."
          gh release download rolling -p "*.xbps" --repo ${{ github.repository }} \
            --dir /tmp/void-packages/hostdir/binpkgs 2>/dev/null \
            || echo "First run or no packages found."
          if ls /tmp/void-packages/hostdir/binpkgs/*.xbps 1>/dev/null 2>&1; then
            cd /tmp/void-packages/hostdir/binpkgs
            xbps-rindex -a *.xbps || true
          fi

      - name: Build self-healing shlibs map
        run: |
          echo "Generating shlibs map by directly extracting props.plist from binaries..."
          touch /tmp/void-packages/common/shlibs
          TMP_SHLIBS=$(mktemp)
          if ls /tmp/void-packages/hostdir/binpkgs/*.xbps 1>/dev/null 2>&1; then
            for file in /tmp/void-packages/hostdir/binpkgs/*.xbps; do
              bsdtar xOf "$file" props.plist 2>/dev/null \
                | awk -F'[><]' '
                  /<key>shlib-provides<\/key>/ { in_provides=1; next }
                  /<key>shlib-requires<\/key>/ { in_provides=0; next }
                  /<key>pkgver<\/key>/ { in_provides=0; next }
                  in_provides && /<string>/ {
                    gsub(/.*<string>|<\/string>.*/, "")
                    libs=$0
                    if (libs != "") {
                      split(libs, arr, " ")
                      for (i in arr) {
                        gsub(/[<>]/, "", arr[i])
                        lib=arr[i]
                        sub(/\.so\..*/, ".so", lib)
                        if (lib != "" && lib ~ /\.so/) print lib "	" lib ".0"
                      }
                    }
                  }
                ' >> "$TMP_SHLIBS" 2>/dev/null || true
            done
          fi
          if [ -s "$TMP_SHLIBS" ]; then
            sort -u "$TMP_SHLIBS" >> /tmp/void-packages/common/shlibs
            echo "Appended $(wc -l < "$TMP_SHLIBS") shlib mappings"
          fi
          rm -f "$TMP_SHLIBS"

      - name: Check binary availability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PACKAGES=""
          for pkg_dir in custom-templates-temp/srcpkgs/*/; do
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            PACKAGES="$PACKAGES $pkg_name"
          done

          SUBPKGS_OF_GCC16="libatomic16 libatomic16-devel libgcc16 libgcc16-devel libgomp16 libgomp16-devel libstdc++16 libstdc++16-devel"
          for skip in $SUBPKGS_OF_GCC16; do
            PACKAGES=${PACKAGES/ $skip / }
          done

          for pkg in $PACKAGES; do
            tmpl="custom-templates-temp/srcpkgs/$pkg/template"
            [ ! -f "$tmpl" ] && continue
            ver=$(grep '^version=' "$tmpl" | head -1 | sed 's/^version=//' | tr -d '"'"'")
            rev=$(grep '^revision=' "$tmpl" | head -1 | sed 's/^revision=//' | tr -d '"'"'")
            EXPECTED="${pkg}-${ver}_${rev}.x86_64.xbps"
            if [ -f "/tmp/void-packages/hostdir/binpkgs/$EXPECTED" ]; then
              echo "✓ $EXPECTED exists locally"
            elif gh release view rolling --json assets --jq '.assets[].name' \
              --repo ${{ github.repository }} 2>/dev/null | grep -qFx "$EXPECTED"; then
              echo "✓ $EXPECTED exists in rolling release"
            else
              echo "✗ $EXPECTED not found — will build"
            fi
          done

          FORCE="${{ github.event.inputs.force_rebuild }}"
          if [ "$FORCE" = "true" ]; then
            echo "TARGET_PKG=${{ env.TARGET_PKG }}" >> $GITHUB_ENV
            echo "FORCE_REBUILD=true" >> $GITHUB_ENV
          fi

      - name: Build package
        if: env.TARGET_PKG != ''
        run: |
          set -e
          cd /tmp/void-packages
          ./xbps-src -f pkg "${{ env.TARGET_PKG }}" 2>&1

      - name: Print built packages
        if: env.TARGET_PKG != ''
        run: |
          echo "=== Built packages in hostdir/binpkgs ==="
          ls -la /tmp/void-packages/hostdir/binpkgs/*.xbps 2>/dev/null || echo "(none yet)"

      - name: Build and Upload Signed Repo to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          get_evaluated_version() {
            local tmpl="$1"
            local ver _basever _commit _shortcommit _gitdate

            ver=$(grep '^version=' "$tmpl" | head -1 | sed 's/^version=//' | tr -d '"'"'" | xargs)
            _basever=$(grep '^_basever=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_basever=//' | tr -d '"'"'" | xargs)
            _commit=$(grep '^_commit=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_commit=//' | tr -d '"'"'" | xargs)
            _shortcommit=$(grep '^_shortcommit=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_shortcommit=//' | tr -d '"'"'" | xargs)
            _gitdate=$(grep '^_gitdate=' "$tmpl" 2>/dev/null | head -1 | sed 's/^_gitdate=//' | tr -d '"'"'" | xargs)

            ver="${ver/\$\{_basever\}/$_basever}"
            ver="${ver/\$\{_commit\}/$_commit}"
            ver="${ver/\$\{_shortcommit\}/$_shortcommit}"
            ver="${ver/\$\{_gitdate\}/$_gitdate}"
            ver="${ver/\$_basever/$_basever}"
            ver="${ver/\$_commit/$_commit}"
            ver="${ver/\$_shortcommit/$_shortcommit}"
            ver="${ver/\$_gitdate/$_gitdate}"

            echo "$ver"
          }

          BINPKGS=/tmp/void-packages/hostdir/binpkgs
          mkdir -p public/x86_64

          ls -1 custom-templates-temp/srcpkgs/ | while read -r pkg_name; do
            [ ! -d "custom-templates-temp/srcpkgs/$pkg_name" ] && continue
            tmpl="custom-templates-temp/srcpkgs/$pkg_name/template"
            [ ! -f "$tmpl" ] && continue

            ver=$(get_evaluated_version "$tmpl")
            rev=$(grep '^revision=' "$tmpl" | head -1 | sed 's/^revision=//' | tr -d '"'"'" | xargs)
            EXPECTED_PKG="${pkg_name}-${ver}_${rev}.x86_64.xbps"

            if [ ! -f "$BINPKGS/$EXPECTED_PKG" ]; then
              echo ">>> $pkg_name: expected binary $EXPECTED_PKG not found, skipping."
              continue
            fi

            cp "$BINPKGS/$EXPECTED_PKG" public/x86_64/
            echo ">>> Copied $EXPECTED_PKG to public/x86_64/"

            SUBPKGS=$(grep '^subpackages=' "$tmpl" 2>/dev/null | head -1 | sed "s/^subpackages=//" | tr -d '"') || true
            if [ -n "$SUBPKGS" ]; then
              for sub in $SUBPKGS; do
                SUB_PKG="${sub}-${ver}_${rev}.x86_64.xbps"
                if [ -f "$BINPKGS/$SUB_PKG" ]; then
                  cp "$BINPKGS/$SUB_PKG" public/x86_64/
                  echo ">>> Copied subpackage $SUB_PKG to public/x86_64/"
                else
                  echo ">>> Subpackage $SUB_PKG not found, skipping."
                  continue
                fi
                OLD_SUB=$(gh release view rolling --json assets \
                  --jq '.assets[].name' --repo "$REPO" 2>/dev/null \
                  | awk -v pkg="${sub}-" 'index($0, pkg) == 1 && /\.x86_64\.xbps$/' \
                  || true)
                for asset in $OLD_SUB; do
                  if [ "$asset" != "$SUB_PKG" ]; then
                    echo "  Deleting old subpackage: $asset"
                    gh release delete-asset rolling "$asset" --repo "$REPO" -y 2>/dev/null || true
                  fi
                done
                OLD_SUB_SIGS=$(gh release view rolling --json assets \
                  --jq '.assets[].name' --repo "$REPO" 2>/dev/null \
                  | awk -v pkg="${sub}-" 'index($0, pkg) == 1 && /\.x86_64\.xbps\.sig2$/' \
                  || true)
                for sig in $OLD_SUB_SIGS; do
                  if [ "$sig" != "${SUB_PKG}.sig2" ]; then
                    echo "  Deleting old subpackage sig: $sig"
                    gh release delete-asset rolling "$sig" --repo "$REPO" -y 2>/dev/null || true
                  fi
                done
              done
            fi

            echo ">>> Purging old versions of $pkg_name from GitHub Release..."
            OLD_XBPS=$(gh release view rolling --json assets \
              --jq '.assets[].name' --repo "$REPO" 2>/dev/null \
              | awk -v pkg="${pkg_name}-" 'index($0, pkg) == 1 && /\.x86_64\.xbps$/' \
              || true)
            for asset in $OLD_XBPS; do
              if [ "$asset" != "$EXPECTED_PKG" ]; then
                echo "  Deleting old binary: $asset"
                gh release delete-asset rolling "$asset" --repo "$REPO" -y 2>/dev/null || true
              fi
            done

            OLD_SIGS=$(gh release view rolling --json assets \
              --jq '.assets[].name' --repo "$REPO" 2>/dev/null \
              | awk -v pkg="${pkg_name}-" 'index($0, pkg) == 1 && /\.x86_64\.xbps\.sig2$/' \
              || true)
            for sig in $OLD_SIGS; do
              if [ "$sig" != "${EXPECTED_PKG}.sig2" ]; then
                echo "  Deleting old signature: $sig"
                gh release delete-asset rolling "$sig" --repo "$REPO" -y 2>/dev/null || true
              fi
            done
          done

          cd public/x86_64
          if ! ls *.xbps 1>/dev/null 2>&1; then
            echo "No .xbps files to upload. Exiting."
            exit 0
          fi

          echo "Generating fresh RSA signatures for all packages..."
          rm -f *.sig2
          printf '%s' "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/private.pem
          chmod 600 /tmp/private.pem
          for pkg in *.xbps; do
            xbps-rindex --privkey /tmp/private.pem --sign-pkg "$pkg" || true
          done

          echo "Generating repodata index..."
          xbps-rindex -f -a *.xbps || true
          if xbps-rindex --privkey /tmp/private.pem \
            --signedby "Void Nexus Build Bot <actions@github.com>" \
            --sign . 2>&1; then
            echo ">>> --sign . succeeded"
          elif xbps-rindex --privkey /tmp/private.pem \
            --signedby "Void Nexus Build Bot <actions@github.com>" \
            --sign 2>&1; then
            echo ">>> --sign (flag only) succeeded"
          else
            echo "::warning::xbps-rindex --sign failed. Repo will lack signature."
          fi
          if [ -f "x86_64-repodata.sig2" ]; then
            echo ">>> Repodata signed OK: x86_64-repodata.sig2"
          else
            echo "::warning::x86_64-repodata.sig2 was NOT created. Repo will lack signature."
          fi

          echo "Generating packages.json for the website..."
          echo "[" > packages.json
          first=1
          for pkg in *.xbps; do
            [ -e "$pkg" ] || continue
            pkgver=$(bsdtar xOf "$pkg" props.plist 2>/dev/null \
              | awk -F'[><]' '
                  /<key>pkgver<\/key>/ { getline; print $3; exit }
              ' || true)
            if [ -z "$pkgver" ]; then
              pkgver=$(basename "$pkg" .x86_64.xbps)
            fi
            pkgver_no_rev="${pkgver%_*}"
            pkg_version="${pkgver_no_rev##*-}"
            pkg_name="${pkgver_no_rev%-${pkg_version}}"
            if [ "$first" -eq 0 ]; then echo "," >> packages.json; fi
            echo -n "  {\"name\": \"$pkg_name\", \"version\": \"$pkg_version\"}" >> packages.json
            first=0
          done
          echo -e "\n]" >> packages.json

          gh release view rolling -R "$REPO" 2>/dev/null \
            || gh release create rolling -R "$REPO" \
                 --title "Void Nexus Rolling Binaries" \
                 --notes "Automated XBPS Repository" \
                 --prerelease
          gh release edit rolling -R "$REPO" --prerelease 2>/dev/null || true

          echo "Uploading XBPS repo files to GitHub Release..."

          retry_upload() {
            local file="$1"
            local max_retries=3
            for i in $(seq 1 $max_retries); do
              if gh release upload rolling -R "$REPO" "$file" --clobber 2>&1; then
                return 0
              fi
              sleep 5
            done
            echo "::error::Failed to upload $file after $max_retries attempts"
            return 1
          }

          retry_upload "x86_64-repodata"

          for pkg in *.xbps; do
            retry_upload "$pkg"
          done

          for sig in *.sig2; do
            [ -f "$sig" ] && retry_upload "$sig"
          done

          retry_upload "packages.json"

          rm -f /tmp/private.pem

      - name: Trigger Relay Race (next package in queue)
        if: env.TARGET_PKG != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LIST="${{ env.PACKAGE_LIST }}"
          read -r -a PKGS <<< "$LIST"
          REMAINING="${PKGS[@]:1}"
          if [ -n "$REMAINING" ]; then
            echo "Relaying to next packages: $REMAINING"
            gh workflow run "Build Nexus XBPS" \
              --ref "${GITHUB_REF_NAME}" \
              --repo "Ackerman-00/void-nexus" \
              -f package_list="$REMAINING" \
              -f force_rebuild="true"
          else
            echo "Build queue finished."
          fi
